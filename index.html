<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Isometric Club Dungeon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }

#bars {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 16px;
  z-index: 10;
}

.bar-container { width: 180px; }

.bar-label {
  color: #aaa;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.bar-outer {
  width: 100%;
  height: 14px;
  background: #1a1a2e;
  border: 1px solid #333;
  position: relative;
  overflow: hidden;
}

.bar-inner {
  height: 100%;
  transition: width 0.15s ease;
}

#stamina-bar { background: #4ecdc4; }
#thirst-bar { background: #ff6b6b; }

.bar-outer.glow {
  box-shadow: 0 0 8px rgba(78, 205, 196, 0.5), 0 0 16px rgba(78, 205, 196, 0.25);
  border-color: #4ecdc4;
}

.bar-outer.glow #stamina-bar {
  background: linear-gradient(90deg, #4ecdc4, #7eeee6);
}

#held-items {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.held-item {
  background: rgba(20, 20, 40, 0.9);
  border: 1px solid #444;
  padding: 8px 14px;
  color: #ddd;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 180px;
  animation: itemSlideIn 0.3s ease-out;
}

@keyframes itemSlideIn {
  from { transform: translateX(30px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.held-item .icon {
  font-size: 18px;
  width: 24px;
  text-align: center;
}

.held-item .desc {
  font-size: 10px;
  color: #888;
}

#room-indicator {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 10;
}

#minimap {
  display: grid;
  grid-template-columns: repeat(2, 22px);
  grid-template-rows: repeat(2, 22px);
  gap: 2px;
}

.minimap-cell {
  width: 22px;
  height: 22px;
  background: #1a1a2e;
  border: 1px solid #333;
}

.minimap-cell.current {
  background: #4ecdc4;
  border-color: #4ecdc4;
}

.minimap-cell.visited {
  background: #2a2a4e;
}

#pickup-flash {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ffd93d;
  font-size: 16px;
  letter-spacing: 2px;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
  text-shadow: 0 0 10px rgba(255,217,61,0.5);
}

#room-name {
  position: fixed;
  top: 55px;
  left: 20px;
  color: #666;
  font-size: 11px;
  letter-spacing: 1px;
  z-index: 10;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="bars">
  <div class="bar-container">
    <div class="bar-label">Stamina</div>
    <div class="bar-outer" id="stamina-outer"><div class="bar-inner" id="stamina-bar"></div></div>
  </div>
  <div class="bar-container">
    <div class="bar-label">Thirst</div>
    <div class="bar-outer"><div class="bar-inner" id="thirst-bar"></div></div>
  </div>
</div>

<div id="held-items"></div>

<div id="room-indicator">
  <div id="minimap"></div>
</div>
<div id="room-name"></div>

<div id="pickup-flash"></div>

<script>
// ── CONFIG ──
const TILE_W = 64;
const TILE_H = 32;
const ROOM_TILES = 11;

// ── CANVAS ──
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── UTILS ──
function toIso(x, y) {
  return {
    sx: (x - y) * (TILE_W / 2),
    sy: (x + y) * (TILE_H / 2)
  };
}

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// ── DUNGEON ──
const DUNGEON_W = 2, DUNGEON_H = 2;
let currentRoom = { x: 0, y: 0 };
let visited = new Set();
visited.add('0,0');

const rooms = {};

const DOOR = {
  N: { tx: 5, ty: 0, dir: { x: 0, y: -1 }, enter: { tx: 5, ty: 9 } },
  S: { tx: 5, ty: 10, dir: { x: 0, y: 1 }, enter: { tx: 5, ty: 1 } },
  E: { tx: 10, ty: 5, dir: { x: 1, y: 0 }, enter: { tx: 1, ty: 5 } },
  W: { tx: 0, ty: 5, dir: { x: -1, y: 0 }, enter: { tx: 9, ty: 5 } }
};

const ITEM_DEFS = [
  { id: 'tablet', name: 'TABLET', icon: '💊', desc: '+Speed', color: '#4ecdc4',
    effect: { speedMult: 1.6 } },
  { id: 'drink', name: 'DRINK', icon: '🍸', desc: 'Reveal crowd / -Speed', color: '#a855f7',
    effect: { speedMult: 0.7, revealNPCs: true } },
  { id: 'sunglasses', name: 'SUNGLASSES', icon: '🕶️', desc: '+Stamina Regen / -Speed / Darker', color: '#fbbf24',
    effect: { staminaRegen: 2.5, speedMult: 0.45, darken: true } },
];

const ITEM_PLACEMENTS = {
  '1,0': 'tablet',
  '0,1': 'drink',
  '1,1': 'sunglasses',
};

// Seeded RNG
function makeRng(seed) {
  let s = seed;
  return () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff; };
}

function generateRoom(rx, ry) {
  const key = `${rx},${ry}`;
  if (rooms[key]) return rooms[key];

  const rand = makeRng(rx * 7 + ry * 13 + 42);

  const doors = [];
  if (ry > 0) doors.push('N');
  if (ry < DUNGEON_H - 1) doors.push('S');
  if (rx < DUNGEON_W - 1) doors.push('E');
  if (rx > 0) doors.push('W');

  // Floor
  const floor = [];
  for (let ty = 0; ty < ROOM_TILES; ty++) {
    floor[ty] = [];
    for (let tx = 0; tx < ROOM_TILES; tx++) {
      floor[ty][tx] = rand() < 0.08 ? 1 : 0;
    }
  }

  // Walls
  const walls = [];
  for (let tx = 0; tx < ROOM_TILES; tx++) {
    for (let ty = 0; ty < ROOM_TILES; ty++) {
      const isEdge = tx === 0 || ty === 0 || tx === ROOM_TILES - 1 || ty === ROOM_TILES - 1;
      if (!isEdge) continue;
      let isDoor = false;
      for (const d of doors) {
        const dd = DOOR[d];
        if (Math.abs(tx - dd.tx) <= 1 && Math.abs(ty - dd.ty) <= 1) isDoor = true;
      }
      if (!isDoor) walls.push({ tx, ty });
    }
  }

  // NPCs — lots of them, it's a club
  const npcs = [];
  const npcCount = 15 + Math.floor(rand() * 20);
  for (let i = 0; i < npcCount; i++) {
    const hidden = rand() < 0.45;
    // Hidden NPCs cluster in small groups (2-4 near same spot)
    let cx, cy;
    if (hidden && npcs.length > 0 && rand() < 0.6) {
      // Cluster near a previous hidden NPC
      const nearby = npcs.filter(n => n.hidden);
      if (nearby.length > 0) {
        const anchor = nearby[Math.floor(rand() * nearby.length)];
        cx = anchor.x + (rand() - 0.5) * 1.2;
        cy = anchor.y + (rand() - 0.5) * 1.2;
      } else {
        cx = 2 + rand() * 7;
        cy = 2 + rand() * 7;
      }
    } else {
      cx = 2 + rand() * 7;
      cy = 2 + rand() * 7;
    }
    cx = clamp(cx, 1.5, ROOM_TILES - 1.5);
    cy = clamp(cy, 1.5, ROOM_TILES - 1.5);

    npcs.push({
      x: cx, y: cy,
      vx: (rand() - 0.5) * (hidden ? 0.15 : 0.5),
      vy: (rand() - 0.5) * (hidden ? 0.15 : 0.5),
      hidden,
      hue: rand() * 360,
      lightness: 25 + rand() * 20,
      phase: rand() * Math.PI * 2,
      height: 0.7 + rand() * 0.4, // varied heights
    });
  }

  // Item
  const itemId = ITEM_PLACEMENTS[key] || null;
  let item = null;
  if (itemId) {
    const def = ITEM_DEFS.find(d => d.id === itemId);
    item = { ...def, tx: 4 + rand() * 3, ty: 4 + rand() * 3, picked: false };
  }

  // Obstacles (pillars, speakers, bar counters)
  const obstacles = [];
  const obsCount = 1 + Math.floor(rand() * 3);
  for (let i = 0; i < obsCount; i++) {
    obstacles.push({
      tx: 2 + Math.floor(rand() * 7),
      ty: 2 + Math.floor(rand() * 7),
      type: rand() < 0.4 ? 'pillar' : rand() < 0.7 ? 'speaker' : 'barrel',
    });
  }

  rooms[key] = { doors, floor, walls, npcs, item, obstacles, rx, ry };
  return rooms[key];
}

// ── PLAYER ──
const player = {
  x: 5.5, y: 5.5,
  speed: 2.8,
  stamina: 100, maxStamina: 100,
  thirst: 80, maxThirst: 100,
  heldItems: [],
  moving: false,
  facing: { x: 0, y: 1 },
  bobPhase: 0,
};

// ── INPUT ──
const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// ── ITEM EFFECTS ──
function getEffects() {
  const fx = { speedMult: 1, revealNPCs: false, staminaRegen: 1.0, darken: false };
  for (const item of player.heldItems) {
    const def = ITEM_DEFS.find(d => d.id === item);
    if (!def) continue;
    if (def.effect.speedMult) fx.speedMult *= def.effect.speedMult;
    if (def.effect.revealNPCs) fx.revealNPCs = true;
    if (def.effect.staminaRegen) fx.staminaRegen *= def.effect.staminaRegen;
    if (def.effect.darken) fx.darken = true;
  }
  return fx;
}

// ── PICKUP (walk-over) ──
let pickupFlashTimer = 0;

function doPickup(room) {
  if (!room.item || room.item.picked) return;
  if (player.heldItems.includes(room.item.id)) return;
  player.heldItems.push(room.item.id);
  room.item.picked = true;
  updateHeldUI();

  // Flash notification
  const flash = document.getElementById('pickup-flash');
  flash.textContent = `+ ${room.item.name}`;
  flash.style.opacity = '1';
  pickupFlashTimer = 1.2;

  // Update stamina bar glow
  updateStaminaGlow();
}

function updateStaminaGlow() {
  const outer = document.getElementById('stamina-outer');
  if (player.heldItems.includes('sunglasses')) {
    outer.classList.add('glow');
  } else {
    outer.classList.remove('glow');
  }
}

function updateHeldUI() {
  const container = document.getElementById('held-items');
  container.innerHTML = '';
  for (const id of player.heldItems) {
    const def = ITEM_DEFS.find(d => d.id === id);
    const el = document.createElement('div');
    el.className = 'held-item';
    el.innerHTML = `<span class="icon">${def.icon}</span><div><div style="color:${def.color}">${def.name}</div><div class="desc">${def.desc}</div></div>`;
    container.appendChild(el);
  }
}

// ── MINIMAP ──
function updateMinimap() {
  const el = document.getElementById('minimap');
  el.innerHTML = '';
  for (let ry = 0; ry < DUNGEON_H; ry++) {
    for (let rx = 0; rx < DUNGEON_W; rx++) {
      const cell = document.createElement('div');
      cell.className = 'minimap-cell';
      if (rx === currentRoom.x && ry === currentRoom.y) cell.classList.add('current');
      else if (visited.has(`${rx},${ry}`)) cell.classList.add('visited');
      el.appendChild(cell);
    }
  }
}
updateMinimap();

function getRoom() {
  return generateRoom(currentRoom.x, currentRoom.y);
}

// ── ROOM TRANSITION ──
let transitioning = false;
let transAlpha = 0;
let transDir = 1;
let pendingRoom = null;
let pendingEnter = null;

function startTransition(door) {
  const d = DOOR[door];
  const nx = currentRoom.x + d.dir.x;
  const ny = currentRoom.y + d.dir.y;
  if (nx < 0 || nx >= DUNGEON_W || ny < 0 || ny >= DUNGEON_H) return;
  transitioning = true;
  transDir = 1;
  transAlpha = 0;
  pendingRoom = { x: nx, y: ny };
  pendingEnter = d.enter;
}

// ── UPDATE ──
let lastTime = performance.now();

function update(now) {
  const rawDt = (now - lastTime) / 1000;
  const dt = Math.min(rawDt, 0.05);
  lastTime = now;

  // Pickup flash fade
  if (pickupFlashTimer > 0) {
    pickupFlashTimer -= dt;
    if (pickupFlashTimer <= 0) {
      document.getElementById('pickup-flash').style.opacity = '0';
    }
  }

  // Transition
  if (transitioning) {
    transAlpha += transDir * dt * 3;
    if (transDir === 1 && transAlpha >= 1) {
      transAlpha = 1;
      transDir = -1;
      currentRoom = pendingRoom;
      visited.add(`${currentRoom.x},${currentRoom.y}`);
      player.x = pendingEnter.tx + 0.5;
      player.y = pendingEnter.ty + 0.5;
      generateRoom(currentRoom.x, currentRoom.y);
      updateMinimap();
    }
    if (transDir === -1 && transAlpha <= 0) {
      transAlpha = 0;
      transitioning = false;
    }
    requestAnimationFrame(update);
    draw();
    return;
  }

  const room = getRoom();
  const fx = getEffects();

  // Movement
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) { dx -= 1; dy -= 1; }
  if (keys['s'] || keys['arrowdown']) { dx += 1; dy += 1; }
  if (keys['a'] || keys['arrowleft']) { dx -= 1; dy += 1; }
  if (keys['d'] || keys['arrowright']) { dx += 1; dy -= 1; }

  player.moving = dx !== 0 || dy !== 0;

  if (player.moving && player.stamina > 0) {
    const len = Math.sqrt(dx * dx + dy * dy);
    dx /= len; dy /= len;
    const spd = player.speed * fx.speedMult;
    player.x += dx * spd * dt;
    player.y += dy * spd * dt;
    player.facing = { x: dx, y: dy };
    player.bobPhase += dt * 10;
    player.stamina -= 8 * dt;
    player.thirst -= 3 * dt;
  } else {
    player.thirst -= 0.5 * dt;
  }

  // Stamina regen (sunglasses: always regens, even while moving)
  if (!player.moving) {
    player.stamina += 5 * fx.staminaRegen * dt;
  } else if (fx.staminaRegen > 1) {
    // Sunglasses: slower regen while moving, but it still happens
    player.stamina += 3 * fx.staminaRegen * dt;
  }

  player.stamina = clamp(player.stamina, 0, player.maxStamina);
  player.thirst = clamp(player.thirst, 0, player.maxThirst);

  // Clamp to room
  player.x = clamp(player.x, 0.5, ROOM_TILES - 0.5);
  player.y = clamp(player.y, 0.5, ROOM_TILES - 0.5);

  // Wall collision
  for (const w of room.walls) {
    const pdx = player.x - (w.tx + 0.5);
    const pdy = player.y - (w.ty + 0.5);
    const dist = Math.sqrt(pdx * pdx + pdy * pdy);
    if (dist < 0.7) {
      const push = (0.7 - dist);
      player.x += (pdx / dist) * push;
      player.y += (pdy / dist) * push;
    }
  }

  // Obstacle collision
  for (const o of room.obstacles) {
    const pdx = player.x - (o.tx + 0.5);
    const pdy = player.y - (o.ty + 0.5);
    const dist = Math.sqrt(pdx * pdx + pdy * pdy);
    if (dist < 0.7) {
      const push = (0.7 - dist);
      player.x += (pdx / dist) * push;
      player.y += (pdy / dist) * push;
    }
  }

  // NPC collision — bumping into people drains stamina
  for (const npc of room.npcs) {
    if (npc.hidden && !fx.revealNPCs) continue; // can't bump shadows
    const ndx = player.x - npc.x;
    const ndy = player.y - npc.y;
    const ndist = Math.sqrt(ndx * ndx + ndy * ndy);
    if (ndist < 0.6) {
      player.stamina -= 15 * dt;
      // Push player out slightly
      if (ndist > 0.01) {
        player.x += (ndx / ndist) * 0.05;
        player.y += (ndy / ndist) * 0.05;
      }
    }
  }

  // Door check
  for (const door of room.doors) {
    const dd = DOOR[door];
    const ddx = player.x - (dd.tx + 0.5);
    const ddy = player.y - (dd.ty + 0.5);
    if (Math.abs(ddx) < 1 && Math.abs(ddy) < 1) {
      startTransition(door);
      break;
    }
  }

  // Walk-over item pickup
  if (room.item && !room.item.picked && !player.heldItems.includes(room.item.id)) {
    const idx = player.x - room.item.tx;
    const idy = player.y - room.item.ty;
    if (Math.sqrt(idx * idx + idy * idy) < 1.0) {
      doPickup(room);
    }
  }

  // NPC movement
  for (const npc of room.npcs) {
    npc.x += npc.vx * dt;
    npc.y += npc.vy * dt;
    npc.phase += dt * 2;

    // Bounce off bounds
    if (npc.x < 1.5 || npc.x > ROOM_TILES - 1.5) npc.vx *= -1;
    if (npc.y < 1.5 || npc.y > ROOM_TILES - 1.5) npc.vy *= -1;
    npc.x = clamp(npc.x, 1.5, ROOM_TILES - 1.5);
    npc.y = clamp(npc.y, 1.5, ROOM_TILES - 1.5);

    // Occasionally change direction (club wandering)
    if (Math.random() < 0.005) {
      npc.vx = (Math.random() - 0.5) * (npc.hidden ? 0.15 : 0.5);
      npc.vy = (Math.random() - 0.5) * (npc.hidden ? 0.15 : 0.5);
    }
  }

  // Update bars
  document.getElementById('stamina-bar').style.width = `${(player.stamina / player.maxStamina) * 100}%`;
  document.getElementById('thirst-bar').style.width = `${(player.thirst / player.maxThirst) * 100}%`;

  // Stamina glow pulse when sunglasses held
  if (player.heldItems.includes('sunglasses')) {
    const pulse = 0.3 + Math.sin(performance.now() / 400) * 0.15;
    document.getElementById('stamina-outer').style.boxShadow =
      `0 0 ${8 + pulse * 10}px rgba(78,205,196,${pulse}), 0 0 ${16 + pulse * 10}px rgba(78,205,196,${pulse * 0.5})`;
  }

  // Room name
  const names = [
    ['Main Floor', 'VIP Booth'],
    ['Lounge', 'DJ Booth'],
  ];
  document.getElementById('room-name').textContent = names[currentRoom.y][currentRoom.x];

  draw();
  requestAnimationFrame(update);
}

// ── DRAW ──
function drawIsoDiamond(cx, cy, w, h, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(cx, cy - h / 2);
  ctx.lineTo(cx + w / 2, cy);
  ctx.lineTo(cx, cy + h / 2);
  ctx.lineTo(cx - w / 2, cy);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1; ctx.stroke(); }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  const camIso = toIso(player.x, player.y);
  const camOx = W / 2 - camIso.sx;
  const camOy = H / 2 - camIso.sy - 60;

  ctx.save();
  ctx.translate(camOx, camOy);

  const room = getRoom();
  const fx = getEffects();
  const time = performance.now() / 1000;

  // Floor tiles
  for (let ty = 0; ty < ROOM_TILES; ty++) {
    for (let tx = 0; tx < ROOM_TILES; tx++) {
      const iso = toIso(tx + 0.5, ty + 0.5);
      const decorated = room.floor[ty][tx] === 1;
      // Checkerboard club floor
      const checker = (tx + ty) % 2 === 0;
      const baseFill = decorated ? '#1e1e3a' : (checker ? '#131325' : '#16162a');
      const baseStroke = '#222240';
      drawIsoDiamond(iso.sx, iso.sy, TILE_W - 2, TILE_H - 2, baseFill, baseStroke);
    }
  }

  // Entities for depth sorting
  const entities = [];

  for (const w of room.walls) {
    entities.push({ type: 'wall', x: w.tx + 0.5, y: w.ty + 0.5, data: w });
  }

  for (const o of room.obstacles) {
    entities.push({ type: 'obstacle', x: o.tx + 0.5, y: o.ty + 0.5, data: o });
  }

  for (const door of room.doors) {
    const dd = DOOR[door];
    entities.push({ type: 'door', x: dd.tx + 0.5, y: dd.ty + 0.5, data: door });
  }

  // NPCs — all of them go in, hidden ones rendered as shadows unless revealed
  for (const npc of room.npcs) {
    entities.push({ type: 'npc', x: npc.x, y: npc.y, data: npc });
  }

  if (room.item && !room.item.picked) {
    entities.push({ type: 'item', x: room.item.tx, y: room.item.ty, data: room.item });
  }

  entities.push({ type: 'player', x: player.x, y: player.y });

  entities.sort((a, b) => (a.x + a.y) - (b.x + b.y));

  for (const ent of entities) {
    const iso = toIso(ent.x, ent.y);

    if (ent.type === 'wall') {
      const wallH = 22;
      // Left face
      ctx.fillStyle = '#2a2a4e';
      ctx.beginPath();
      ctx.moveTo(iso.sx, iso.sy - wallH - TILE_H / 2);
      ctx.lineTo(iso.sx + TILE_W / 2, iso.sy - wallH);
      ctx.lineTo(iso.sx + TILE_W / 2, iso.sy);
      ctx.lineTo(iso.sx, iso.sy + TILE_H / 2);
      ctx.lineTo(iso.sx - TILE_W / 2, iso.sy);
      ctx.lineTo(iso.sx - TILE_W / 2, iso.sy - wallH);
      ctx.closePath();
      ctx.fill();

      // Top
      drawIsoDiamond(iso.sx, iso.sy - wallH, TILE_W - 2, TILE_H - 2, '#3a3a5e', '#4a4a6e');

      // Right face shading
      ctx.fillStyle = '#222244';
      ctx.beginPath();
      ctx.moveTo(iso.sx, iso.sy - wallH + TILE_H / 2 - 1);
      ctx.lineTo(iso.sx + TILE_W / 2 - 1, iso.sy - wallH);
      ctx.lineTo(iso.sx + TILE_W / 2 - 1, iso.sy);
      ctx.lineTo(iso.sx, iso.sy + TILE_H / 2 - 1);
      ctx.closePath();
      ctx.fill();
    }

    if (ent.type === 'obstacle') {
      const o = ent.data;
      if (o.type === 'pillar') {
        const ph = 30;
        ctx.fillStyle = '#3d3d5c';
        ctx.beginPath();
        ctx.moveTo(iso.sx - 8, iso.sy);
        ctx.lineTo(iso.sx - 8, iso.sy - ph);
        ctx.lineTo(iso.sx + 8, iso.sy - ph);
        ctx.lineTo(iso.sx + 8, iso.sy);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#4d4d6c';
        ctx.fillRect(iso.sx - 10, iso.sy - ph - 4, 20, 6);
      } else if (o.type === 'speaker') {
        // Speaker stack
        const sh = 24;
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(iso.sx - 10, iso.sy - sh, 20, sh);
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(iso.sx, iso.sy - sh / 2, 6, 0, Math.PI * 2);
        ctx.fill();
        // Bass pulse
        const pulse = Math.sin(time * 8) * 0.3 + 0.5;
        ctx.strokeStyle = `rgba(160, 80, 255, ${pulse * 0.4})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(iso.sx, iso.sy - sh / 2, 8 + pulse * 3, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        // Barrel / keg
        const bh = 16;
        ctx.fillStyle = '#4a3a2a';
        ctx.beginPath();
        ctx.ellipse(iso.sx, iso.sy, 10, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#5a4a3a';
        ctx.fillRect(iso.sx - 10, iso.sy - bh, 20, bh);
        ctx.fillStyle = '#6a5a4a';
        ctx.beginPath();
        ctx.ellipse(iso.sx, iso.sy - bh, 10, 5, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    if (ent.type === 'door') {
      drawIsoDiamond(iso.sx, iso.sy, TILE_W * 1.5, TILE_H * 1.5,
        `rgba(78, 205, 196, ${0.06 + Math.sin(time * 3) * 0.03})`);
      const arrow = ent.data;
      ctx.fillStyle = `rgba(78, 205, 196, ${0.35 + Math.sin(time * 4) * 0.2})`;
      ctx.font = '16px monospace';
      ctx.textAlign = 'center';
      const arrowChars = { N: '▲', S: '▼', E: '▶', W: '◀' };
      ctx.fillText(arrowChars[arrow], iso.sx, iso.sy + 5);
    }

    if (ent.type === 'npc') {
      const npc = ent.data;
      const bob = Math.sin(npc.phase) * 2;
      const h = npc.height;

      if (npc.hidden && !fx.revealNPCs) {
        // Hidden NPCs: dark shadow silhouettes in a crowd cluster
        ctx.globalAlpha = 0.18 + Math.sin(time * 1.5 + npc.phase) * 0.05;

        // Shadow blob on ground
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.ellipse(iso.sx, iso.sy + 2, 8, 4, 0, 0, Math.PI * 2);
        ctx.fill();

        // Dark silhouette body
        ctx.fillStyle = '#0a0a15';
        ctx.beginPath();
        ctx.ellipse(iso.sx, iso.sy - 8 * h + bob * 0.3, 6 * h, 9 * h, 0, 0, Math.PI * 2);
        ctx.fill();

        // Dark head
        ctx.beginPath();
        ctx.arc(iso.sx, iso.sy - 18 * h + bob * 0.3, 4 * h, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = 1;
      } else {
        // Visible NPC
        const isRevealed = npc.hidden && fx.revealNPCs;
        const alpha = isRevealed ? 0.55 : 0.85;

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(iso.sx, iso.sy + 2, 9, 4.5, 0, 0, Math.PI * 2);
        ctx.fill();

        // Body
        ctx.globalAlpha = alpha;
        ctx.fillStyle = `hsl(${npc.hue}, 30%, ${npc.lightness}%)`;
        ctx.beginPath();
        ctx.ellipse(iso.sx, iso.sy - 9 * h + bob, 6.5 * h, 10 * h, 0, 0, Math.PI * 2);
        ctx.fill();

        // Head
        ctx.fillStyle = `hsl(${npc.hue}, 15%, ${npc.lightness + 25}%)`;
        ctx.beginPath();
        ctx.arc(iso.sx, iso.sy - 20 * h + bob, 4.5 * h, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Purple reveal shimmer for newly visible hidden NPCs
        if (isRevealed) {
          ctx.strokeStyle = `rgba(168, 85, 247, ${0.25 + Math.sin(time * 5 + npc.phase) * 0.15})`;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(iso.sx, iso.sy - 12 * h + bob, 12 * h, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
    }

    if (ent.type === 'item') {
      const item = ent.data;
      const float = Math.sin(time * 2.5) * 4;
      const glow = 0.3 + Math.sin(time * 3) * 0.15;

      // Ground glow
      ctx.fillStyle = `rgba(255, 217, 61, ${glow * 0.25})`;
      ctx.beginPath();
      ctx.arc(iso.sx, iso.sy, 22, 0, Math.PI * 2);
      ctx.fill();

      // Icon
      ctx.font = '26px serif';
      ctx.textAlign = 'center';
      ctx.fillText(item.icon, iso.sx, iso.sy - 10 + float);

      // Name tag
      ctx.font = 'bold 10px Courier New';
      ctx.fillStyle = item.color;
      ctx.fillText(item.name, iso.sx, iso.sy + 12);
    }

    if (ent.type === 'player') {
      const bob = player.moving ? Math.sin(player.bobPhase) * 3 : 0;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.beginPath();
      ctx.ellipse(iso.sx, iso.sy + 2, 12, 6, 0, 0, Math.PI * 2);
      ctx.fill();

      // Body
      ctx.fillStyle = '#e8e8e8';
      ctx.beginPath();
      ctx.ellipse(iso.sx, iso.sy - 10 + bob, 8, 12, 0, 0, Math.PI * 2);
      ctx.fill();

      // Head
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(iso.sx, iso.sy - 24 + bob, 6, 0, Math.PI * 2);
      ctx.fill();

      // Eyes
      const ex = player.facing.x * 2;
      const ey = player.facing.y * 1;
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(iso.sx - 2 + ex, iso.sy - 25 + bob + ey, 1.5, 0, Math.PI * 2);
      ctx.arc(iso.sx + 2 + ex, iso.sy - 25 + bob + ey, 1.5, 0, Math.PI * 2);
      ctx.fill();

      // Tablet speed lines
      if (player.moving && player.heldItems.includes('tablet')) {
        ctx.strokeStyle = 'rgba(78, 205, 196, 0.3)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 3; i++) {
          const ox = -player.facing.x * (10 + i * 6);
          const oy = -player.facing.y * (5 + i * 3);
          ctx.beginPath();
          ctx.moveTo(iso.sx + ox - 4, iso.sy - 10 + bob + oy + i * 4);
          ctx.lineTo(iso.sx + ox + 4, iso.sy - 10 + bob + oy + i * 4);
          ctx.stroke();
        }
      }

      // Drink aura (purple reveal field)
      if (player.heldItems.includes('drink')) {
        ctx.strokeStyle = `rgba(168, 85, 247, ${0.12 + Math.sin(time * 3) * 0.08})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(iso.sx, iso.sy - 10, 28 + Math.sin(time * 2) * 3, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Sunglasses visual on player
      if (player.heldItems.includes('sunglasses')) {
        ctx.strokeStyle = '#fbbf24';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(iso.sx - 6, iso.sy - 25 + bob);
        ctx.lineTo(iso.sx + 6, iso.sy - 25 + bob);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(251, 191, 36, 0.4)';
        ctx.beginPath();
        ctx.rect(iso.sx - 6, iso.sy - 27 + bob, 5, 4);
        ctx.rect(iso.sx + 1, iso.sy - 27 + bob, 5, 4);
        ctx.stroke();
      }
    }
  }

  ctx.restore();

  // Transition overlay
  if (transitioning) {
    ctx.fillStyle = `rgba(0, 0, 0, ${transAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Exhaustion vignette
  if (player.stamina < 25) {
    const intensity = 1 - (player.stamina / 25);
    const grad = ctx.createRadialGradient(W/2, H/2, W * 0.3, W/2, H/2, W * 0.7);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, `rgba(0,0,0,${intensity * 0.5})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  // Sunglasses darkness overlay
  if (getEffects().darken) {
    const pulse = 0.35 + Math.sin(performance.now() / 1500) * 0.05;
    ctx.fillStyle = `rgba(0, 0, 0, ${pulse})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Thirst warning
  if (player.thirst < 20) {
    const intensity = 1 - (player.thirst / 20);
    const grad = ctx.createRadialGradient(W/2, H/2, W * 0.3, W/2, H/2, W * 0.7);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, `rgba(120,20,20,${intensity * 0.4})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }
}

// ── INIT ──
generateRoom(0, 0);
requestAnimationFrame(update);
</script>
</body>
