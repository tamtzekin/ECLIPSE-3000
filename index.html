<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Isometric Club Dungeon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }

#bars {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 16px;
  z-index: 10;
}

.bar-container { width: 180px; }

.bar-label {
  color: #aaa;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.bar-outer {
  width: 100%;
  height: 14px;
  background: #1a1a2e;
  border: 1px solid #333;
  position: relative;
  overflow: hidden;
}

.bar-inner {
  height: 100%;
  transition: width 0.15s ease;
}

#stamina-bar { background: #4ecdc4; }
#thirst-bar { background: #ff6b6b; }

.bar-outer.glow {
  box-shadow: 0 0 8px rgba(78, 205, 196, 0.5), 0 0 16px rgba(78, 205, 196, 0.25);
  border-color: #4ecdc4;
}

#held-items {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.held-item {
  background: rgba(20, 20, 40, 0.9);
  border: 1px solid #444;
  padding: 8px 14px;
  color: #ddd;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 180px;
  animation: itemSlideIn 0.3s ease-out;
  cursor: pointer;
  user-select: none;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}

.held-item:hover {
  border-color: #ff6b6b;
  background: rgba(40, 20, 20, 0.9);
}

.held-item:hover::after {
  content: 'click to drop';
  position: absolute;
  right: -90px;
  font-size: 9px;
  color: #ff6b6b;
  white-space: nowrap;
}

@keyframes itemSlideIn {
  from { transform: translateX(30px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.held-item .icon { font-size: 18px; width: 24px; text-align: center; }
.held-item .desc { font-size: 10px; color: #888; }

#room-indicator { position: fixed; top: 20px; left: 20px; z-index: 10; }

#minimap {
  display: grid;
  grid-template-columns: repeat(2, 22px);
  grid-template-rows: repeat(2, 22px);
  gap: 2px;
}

.minimap-cell { width: 22px; height: 22px; background: #1a1a2e; border: 1px solid #333; }
.minimap-cell.current { background: #4ecdc4; border-color: #4ecdc4; }
.minimap-cell.visited { background: #2a2a4e; }

#pickup-flash {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ffd93d;
  font-size: 16px;
  letter-spacing: 2px;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
  text-shadow: 0 0 10px rgba(255,217,61,0.5);
}

#room-name {
  position: fixed;
  top: 55px;
  left: 20px;
  color: #666;
  font-size: 11px;
  letter-spacing: 1px;
  z-index: 10;
}

#dialogue-box {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10, 10, 20, 0.95);
  border: 1px solid #555;
  padding: 14px 20px;
  color: #e8e8e8;
  font-size: 13px;
  z-index: 20;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  max-width: 360px;
  min-width: 240px;
  letter-spacing: 0.3px;
  line-height: 1.5;
}

#dialogue-box .npc-name {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 6px;
}

#dialogue-box .dialogue-text { color: #ccc; }

#thirst-warning {
  position: fixed;
  bottom: 42px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 6px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

#thirst-warning .icon { font-size: 16px; }
#thirst-warning .text { color: #ff6b6b; font-size: 10px; letter-spacing: 1px; }

#audio-prompt {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 15;
  background: rgba(20, 20, 40, 0.9);
  border: 1px solid #444;
  padding: 8px 18px;
  color: #aaa;
  font-size: 11px;
  cursor: pointer;
  letter-spacing: 1px;
}

#audio-prompt:hover { border-color: #4ecdc4; color: #4ecdc4; }

#sc-player { display: none; }

#bar-menu {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(8, 8, 18, 0.97);
  border: 1px solid #555;
  padding: 0;
  z-index: 30;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  min-width: 280px;
  font-family: 'Courier New', monospace;
}

#bar-menu.open {
  opacity: 1;
  pointer-events: auto;
}

#bar-menu .bar-header {
  background: rgba(30, 20, 50, 0.9);
  padding: 10px 16px;
  border-bottom: 1px solid #444;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#bar-menu .bar-title {
  color: #a855f7;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 3px;
}

#bar-menu .bar-wallet {
  color: #fbbf24;
  font-size: 12px;
}

#bar-menu .bar-items {
  padding: 8px 0;
}

.bar-item {
  padding: 8px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: background 0.1s;
  color: #ccc;
  font-size: 12px;
}

.bar-item:hover {
  background: rgba(168, 85, 247, 0.15);
}

.bar-item.cant-afford {
  color: #555;
  cursor: default;
}

.bar-item .drink-name {
  display: flex;
  align-items: center;
  gap: 8px;
}

.bar-item .drink-effect {
  font-size: 9px;
  color: #888;
}

.bar-item .drink-price {
  color: #fbbf24;
  font-size: 11px;
}

.bar-item.cant-afford .drink-price { color: #555; }

#bar-menu .bar-close {
  padding: 6px 16px;
  text-align: center;
  color: #666;
  font-size: 10px;
  border-top: 1px solid #333;
  letter-spacing: 1px;
}

#bar-prompt {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  color: #a855f7;
  font-size: 11px;
  letter-spacing: 1px;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

#wallet-display {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: #fbbf24;
  font-size: 12px;
  letter-spacing: 1px;
  z-index: 10;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="bars">
  <div class="bar-container">
    <div class="bar-label">Stamina</div>
    <div class="bar-outer" id="stamina-outer"><div class="bar-inner" id="stamina-bar"></div></div>
  </div>
  <div class="bar-container">
    <div class="bar-label">Thirst</div>
    <div class="bar-outer"><div class="bar-inner" id="thirst-bar"></div></div>
  </div>
</div>

<div id="held-items"></div>

<div id="room-indicator"><div id="minimap"></div></div>
<div id="room-name"></div>
<div id="pickup-flash"></div>
<div id="dialogue-box"><div class="npc-name"></div><div class="dialogue-text"></div></div>
<div id="wallet-display"></div>
<div id="bar-prompt">[E] ORDER AT BAR</div>
<div id="bar-menu">
  <div class="bar-header">
    <span class="bar-title">BAR</span>
    <span class="bar-wallet"></span>
  </div>
  <div class="bar-items"></div>
  <div class="bar-close">ESC to close</div>
</div>
<div id="thirst-warning"><span class="icon">🚫💬</span><span class="text">TOO THIRSTY TO TALK</span></div>

<iframe id="sc-player"
  width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay"
  src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/parrenin-didier/essential-mix-19-02-2006-trance-energy-armin-van-buuren-and-judge-jules&auto_play=false&show_artwork=false">
</iframe>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
// ── AUDIO ──
let scWidget = null;
let audioStarted = false;

function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  const iframe = document.getElementById('sc-player');
  scWidget = SC.Widget(iframe);
  scWidget.bind(SC.Widget.Events.READY, () => {
    scWidget.seekTo(448000);
    scWidget.play();
    scWidget.setVolume(40);
  });
}

// Auto-start music on first user interaction (browser requires gesture)
document.addEventListener('keydown', function autoPlay() {
  startAudio();
  document.removeEventListener('keydown', autoPlay);
}, { once: true });
document.addEventListener('click', function autoPlay() {
  startAudio();
  document.removeEventListener('click', autoPlay);
}, { once: true });

// ── CONFIG ──
const TILE_W = 64;
const TILE_H = 32;
const ROOM_TILES = 11;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

function toIso(x, y) { return { sx: (x - y) * (TILE_W / 2), sy: (x + y) * (TILE_H / 2) }; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function dist(ax, ay, bx, by) { const dx = ax-bx, dy = ay-by; return Math.sqrt(dx*dx+dy*dy); }

// ── DUNGEON ──
const DUNGEON_W = 2, DUNGEON_H = 2;
let currentRoom = { x: 0, y: 0 };
let visited = new Set(['0,0']);
const rooms = {};

const DOOR = {
  N: { tx: 5, ty: 0, dir: { x: 0, y: -1 }, enter: { tx: 5, ty: 9 } },
  S: { tx: 5, ty: 10, dir: { x: 0, y: 1 }, enter: { tx: 5, ty: 1 } },
  E: { tx: 10, ty: 5, dir: { x: 1, y: 0 }, enter: { tx: 1, ty: 5 } },
  W: { tx: 0, ty: 5, dir: { x: -1, y: 0 }, enter: { tx: 9, ty: 5 } }
};

const ITEM_DEFS = [
  { id: 'tablet', name: 'TABLET', icon: '💊', desc: '+Speed', color: '#4ecdc4',
    effect: { speedMult: 1.6 } },
  { id: 'drink', name: 'DRINK', icon: '🍸', desc: 'Reveal crowd / -Speed', color: '#a855f7',
    effect: { speedMult: 0.7, revealNPCs: true } },
  { id: 'sunglasses', name: 'SUNGLASSES', icon: '🕶️', desc: '+Stamina Regen / -Speed / Darker', color: '#fbbf24',
    effect: { staminaRegen: 2.5, speedMult: 0.45, darken: true } },
];

const ITEM_PLACEMENTS = { '1,0': 'tablet', '0,1': 'drink', '1,1': 'sunglasses' };

// ── BAR SYSTEM ──
const DRINKS = [
  { name: 'Water', icon: '💧', price: 1, effect: 'thirst', amount: 30, desc: '+30 Thirst' },
  { name: 'Beer', icon: '🍺', price: 3, effect: 'thirst', amount: 50, desc: '+50 Thirst' },
  { name: 'Espresso', icon: '☕', price: 4, effect: 'stamina', amount: 40, desc: '+40 Stamina' },
  { name: 'Red Bull Vodka', icon: '⚡', price: 6, effect: 'both', amount: 25, desc: '+25 Both' },
  { name: 'Champagne', icon: '🥂', price: 10, effect: 'thirst', amount: 100, desc: 'Full Thirst' },
];

// Bar counter location: Lounge room (0,1), position near center-left
const BAR_ROOM = '0,1';
const BAR_POS = { x: 3.5, y: 5.5 };
let barMenuOpen = false;
let nearBar = false;

// NPC names and dialogue lines
const NPC_NAMES = [
  'RAVER', 'BOUNCER', 'BARTENDER', 'DJ', 'REGULAR', 'STRANGER',
  'PROMOTER', 'DANCER', 'LOST SOUL', 'WALLFLOWER', 'VIP', 'DEALER',
];

const NPC_LINES = [
  "You look like you need water...",
  "This DJ hasn't dropped the beat in twenty minutes.",
  "I've been here since Thursday. What day is it?",
  "Don't go to the back room. Trust me.",
  "Have you seen my friend? Tall, wearing all black... like everyone else here.",
  "The drinks here taste like regret.",
  "I swear the walls are moving.",
  "You feel that bass in your chest? That's not your heartbeat anymore.",
  "Someone told me there's a secret room. Behind the speakers.",
  "I can't find the exit. Can you?",
  "The lights... they know things.",
  "Keep moving. If you stop, you become one of them.",
  "This used to be a church, you know.",
  "I think the music is getting slower.",
  "You look different from the rest. More... solid.",
  "Buy me a drink and I'll tell you everything.",
  "The bouncer at the VIP doesn't blink. Have you noticed?",
  "I forgot why I came here.",
  "Don't make eye contact with the shadows.",
  "The coat check has been closed for three days.",
];

function makeRng(seed) {
  let s = seed;
  return () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff; };
}

function generateRoom(rx, ry) {
  const key = `${rx},${ry}`;
  if (rooms[key]) return rooms[key];
  const rand = makeRng(rx * 7 + ry * 13 + 42);

  const doors = [];
  if (ry > 0) doors.push('N');
  if (ry < DUNGEON_H - 1) doors.push('S');
  if (rx < DUNGEON_W - 1) doors.push('E');
  if (rx > 0) doors.push('W');

  const floor = [];
  for (let ty = 0; ty < ROOM_TILES; ty++) {
    floor[ty] = [];
    for (let tx = 0; tx < ROOM_TILES; tx++) floor[ty][tx] = rand() < 0.08 ? 1 : 0;
  }

  const walls = [];
  for (let tx = 0; tx < ROOM_TILES; tx++) {
    for (let ty = 0; ty < ROOM_TILES; ty++) {
      if (!(tx === 0 || ty === 0 || tx === ROOM_TILES-1 || ty === ROOM_TILES-1)) continue;
      let isDoor = false;
      for (const d of doors) {
        const dd = DOOR[d];
        if (Math.abs(tx - dd.tx) <= 1 && Math.abs(ty - dd.ty) <= 1) isDoor = true;
      }
      if (!isDoor) walls.push({ tx, ty });
    }
  }

  // Individual NPCs
  const npcs = [];
  const npcCount = 12 + Math.floor(rand() * 15);
  for (let i = 0; i < npcCount; i++) {
    const hidden = rand() < 0.45;
    let cx, cy;
    if (hidden && npcs.length > 0 && rand() < 0.6) {
      const nearby = npcs.filter(n => n.hidden);
      if (nearby.length > 0) {
        const anchor = nearby[Math.floor(rand() * nearby.length)];
        cx = anchor.x + (rand() - 0.5) * 1.2;
        cy = anchor.y + (rand() - 0.5) * 1.2;
      } else { cx = 2 + rand() * 7; cy = 2 + rand() * 7; }
    } else { cx = 2 + rand() * 7; cy = 2 + rand() * 7; }

    // Some visible NPCs are talkable
    const talkable = !hidden && rand() < 0.3;

    npcs.push({
      x: clamp(cx, 1.5, 9.5), y: clamp(cy, 1.5, 9.5),
      vx: (rand()-0.5) * (hidden ? 0.15 : 0.5),
      vy: (rand()-0.5) * (hidden ? 0.15 : 0.5),
      hidden, hue: rand()*360, lightness: 25+rand()*20,
      phase: rand()*Math.PI*2, height: 0.7+rand()*0.4,
      talkable,
      name: talkable ? NPC_NAMES[Math.floor(rand() * NPC_NAMES.length)] : null,
      line: talkable ? NPC_LINES[Math.floor(rand() * NPC_LINES.length)] : null,
    });
  }

  // Dancing crowd clusters — huddled tight, jumping together
  const crowds = [];
  const crowdCount = 2 + Math.floor(rand() * 3);
  for (let c = 0; c < crowdCount; c++) {
    const cx = 2.5 + rand() * 6;
    const cy = 2.5 + rand() * 6;
    const size = 4 + Math.floor(rand() * 5); // 4-8 per cluster
    const members = [];
    // Tighter huddle — smaller offsets
    for (let m = 0; m < size; m++) {
      const angle = (m / size) * Math.PI * 2 + rand() * 0.5;
      const r = 0.4 + rand() * 0.6;
      members.push({
        ox: Math.cos(angle) * r,
        oy: Math.sin(angle) * r,
        hue: rand() * 360, lightness: 30 + rand() * 25,
        phase: rand() * Math.PI * 2, height: 0.75 + rand() * 0.35,
      });
    }
    crowds.push({ x: cx, y: cy, radius: 1.3, members });
  }

  const itemId = ITEM_PLACEMENTS[key] || null;
  let item = null;
  if (itemId) {
    const def = ITEM_DEFS.find(d => d.id === itemId);
    item = { ...def, tx: 4+rand()*3, ty: 4+rand()*3, picked: false };
  }

  const obstacles = [];
  const obsCount = 1 + Math.floor(rand() * 3);
  for (let i = 0; i < obsCount; i++) {
    obstacles.push({
      tx: 2+Math.floor(rand()*7), ty: 2+Math.floor(rand()*7),
      type: rand()<0.4 ? 'pillar' : rand()<0.7 ? 'speaker' : 'barrel',
    });
  }

  const droppedItems = [];

  rooms[key] = { doors, floor, walls, npcs, crowds, item, obstacles, droppedItems, rx, ry };
  return rooms[key];
}

// ── PLAYER ──
const player = {
  x: 5.5, y: 5.5,
  speed: 2.8,
  stamina: 100, maxStamina: 100,
  thirst: 80, maxThirst: 100,
  euros: 15,
  heldItems: [],
  moving: false,
  facing: { x: 0, y: 1 },
  bobPhase: 0,
};

// ── DIALOGUE ──
let dialogueTimer = 0;
let nearTalkable = null; // NPC near enough to talk to

// ── INPUT ──
const keys = {};
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (k === 'e') onInteract();
  if (k === 'escape') closeBarMenu();
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function onInteract() {
  // Priority: bar menu > talk to NPC
  if (barMenuOpen) { closeBarMenu(); return; }
  if (nearBar) { openBarMenu(); return; }
  if (!nearTalkable) return;
  if (player.thirst <= 0) return;
  const npc = nearTalkable;
  const box = document.getElementById('dialogue-box');
  box.querySelector('.npc-name').textContent = npc.name;
  box.querySelector('.npc-name').style.color = `hsl(${npc.hue}, 50%, 70%)`;
  box.querySelector('.dialogue-text').textContent = npc.line;
  box.style.opacity = '1';
  dialogueTimer = 3.5;
}

function openBarMenu() {
  barMenuOpen = true;
  renderBarMenu();
  document.getElementById('bar-menu').classList.add('open');
}

function closeBarMenu() {
  barMenuOpen = false;
  document.getElementById('bar-menu').classList.remove('open');
}

function renderBarMenu() {
  const container = document.querySelector('#bar-menu .bar-items');
  const wallet = document.querySelector('#bar-menu .bar-wallet');
  wallet.textContent = `€${player.euros}`;
  container.innerHTML = '';
  for (const drink of DRINKS) {
    const canAfford = player.euros >= drink.price;
    const el = document.createElement('div');
    el.className = 'bar-item' + (canAfford ? '' : ' cant-afford');
    el.innerHTML = `<div class="drink-name"><span>${drink.icon}</span><div>${drink.name}<div class="drink-effect">${drink.desc}</div></div></div><span class="drink-price">€${drink.price}</span>`;
    if (canAfford) {
      el.addEventListener('click', () => buyDrink(drink));
    }
    container.appendChild(el);
  }
}

function buyDrink(drink) {
  if (player.euros < drink.price) return;
  player.euros -= drink.price;
  if (drink.effect === 'thirst') {
    player.thirst = Math.min(player.maxThirst, player.thirst + drink.amount);
  } else if (drink.effect === 'stamina') {
    player.stamina = Math.min(player.maxStamina, player.stamina + drink.amount);
  } else if (drink.effect === 'both') {
    player.thirst = Math.min(player.maxThirst, player.thirst + drink.amount);
    player.stamina = Math.min(player.maxStamina, player.stamina + drink.amount);
  }
  // Flash
  const flash = document.getElementById('pickup-flash');
  flash.textContent = `${drink.icon} ${drink.name}`;
  flash.style.color = '#a855f7';
  flash.style.opacity = '1';
  pickupFlashTimer = 1.0;
  setTimeout(() => flash.style.color = '#ffd93d', 1100);
  renderBarMenu();
}

// ── EFFECTS ──
function getEffects() {
  const fx = { speedMult: 1, revealNPCs: false, staminaRegen: 1.0, darken: false };
  for (const item of player.heldItems) {
    const def = ITEM_DEFS.find(d => d.id === item);
    if (!def) continue;
    if (def.effect.speedMult) fx.speedMult *= def.effect.speedMult;
    if (def.effect.revealNPCs) fx.revealNPCs = true;
    if (def.effect.staminaRegen) fx.staminaRegen *= def.effect.staminaRegen;
    if (def.effect.darken) fx.darken = true;
  }
  return fx;
}

// ── PICKUP ──
let pickupFlashTimer = 0;

function doPickup(itemDef) {
  if (player.heldItems.includes(itemDef.id)) return;
  player.heldItems.push(itemDef.id);
  updateHeldUI();
  const flash = document.getElementById('pickup-flash');
  flash.textContent = `+ ${itemDef.name}`;
  flash.style.opacity = '1';
  pickupFlashTimer = 1.2;
  updateStaminaGlow();
}

function unequipItem(itemId) {
  const idx = player.heldItems.indexOf(itemId);
  if (idx === -1) return;
  player.heldItems.splice(idx, 1);
  updateHeldUI();
  updateStaminaGlow();
  const room = getRoom();
  const def = ITEM_DEFS.find(d => d.id === itemId);
  room.droppedItems.push({
    ...def, tx: player.x + (Math.random()-0.5)*1.5, ty: player.y + (Math.random()-0.5)*1.5, picked: false,
  });
  const flash = document.getElementById('pickup-flash');
  flash.textContent = `- ${def.name}`;
  flash.style.color = '#ff6b6b';
  flash.style.opacity = '1';
  pickupFlashTimer = 1.0;
  setTimeout(() => flash.style.color = '#ffd93d', 1100);
}

function updateStaminaGlow() {
  document.getElementById('stamina-outer').classList.toggle('glow', player.heldItems.includes('sunglasses'));
}

function updateHeldUI() {
  const container = document.getElementById('held-items');
  container.innerHTML = '';
  for (const id of player.heldItems) {
    const def = ITEM_DEFS.find(d => d.id === id);
    const el = document.createElement('div');
    el.className = 'held-item';
    el.innerHTML = `<span class="icon">${def.icon}</span><div><div style="color:${def.color}">${def.name}</div><div class="desc">${def.desc}</div></div>`;
    el.addEventListener('click', () => unequipItem(id));
    container.appendChild(el);
  }
}

// ── MINIMAP ──
function updateMinimap() {
  const el = document.getElementById('minimap');
  el.innerHTML = '';
  for (let ry = 0; ry < DUNGEON_H; ry++) {
    for (let rx = 0; rx < DUNGEON_W; rx++) {
      const cell = document.createElement('div');
      cell.className = 'minimap-cell';
      if (rx === currentRoom.x && ry === currentRoom.y) cell.classList.add('current');
      else if (visited.has(`${rx},${ry}`)) cell.classList.add('visited');
      el.appendChild(cell);
    }
  }
}
updateMinimap();

function getRoom() { return generateRoom(currentRoom.x, currentRoom.y); }

// ── TRANSITION ──
let transitioning = false;
let transAlpha = 0;
let transDir = 1;
let pendingRoom = null;
let pendingEnter = null;

function startTransition(door) {
  if (transitioning) return;
  const d = DOOR[door];
  const nx = currentRoom.x + d.dir.x;
  const ny = currentRoom.y + d.dir.y;
  if (nx < 0 || nx >= DUNGEON_W || ny < 0 || ny >= DUNGEON_H) return;
  transitioning = true;
  transDir = 1;
  transAlpha = 0;
  pendingRoom = { x: nx, y: ny };
  pendingEnter = d.enter;
}

// ── UPDATE ──
let lastTime = performance.now();

function update(now) {
  const rawDt = (now - lastTime) / 1000;
  const dt = Math.min(rawDt, 0.05);
  lastTime = now;

  if (pickupFlashTimer > 0) {
    pickupFlashTimer -= dt;
    if (pickupFlashTimer <= 0) document.getElementById('pickup-flash').style.opacity = '0';
  }

  if (dialogueTimer > 0) {
    dialogueTimer -= dt;
    if (dialogueTimer <= 0) document.getElementById('dialogue-box').style.opacity = '0';
  }

  // Transition
  if (transitioning) {
    transAlpha += transDir * dt * 3;
    if (transDir === 1 && transAlpha >= 1) {
      transAlpha = 1;
      transDir = -1;
      currentRoom = pendingRoom;
      visited.add(`${currentRoom.x},${currentRoom.y}`);
      player.x = pendingEnter.tx + 0.5;
      player.y = pendingEnter.ty + 0.5;
      generateRoom(currentRoom.x, currentRoom.y);
      updateMinimap();
    }
    if (transDir === -1 && transAlpha <= 0) {
      transAlpha = 0;
      transitioning = false;
    }
    requestAnimationFrame(update);
    draw();
    return;
  }

  const room = getRoom();
  const fx = getEffects();

  // Movement input
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) { dx -= 1; dy -= 1; }
  if (keys['s'] || keys['arrowdown']) { dx += 1; dy += 1; }
  if (keys['a'] || keys['arrowleft']) { dx -= 1; dy += 1; }
  if (keys['d'] || keys['arrowright']) { dx += 1; dy -= 1; }

  player.moving = dx !== 0 || dy !== 0;

  // Speed calculation
  let speedMult = fx.speedMult;
  const exhausted = player.stamina <= 0;
  if (exhausted) speedMult *= 0.35;

  // Check overlap with any NPC or crowd — slow down when pushing through
  let touchingNPC = false;
  for (const npc of room.npcs) {
    if (npc.hidden && !fx.revealNPCs) continue;
    if (dist(player.x, player.y, npc.x, npc.y) < 0.8) { touchingNPC = true; break; }
  }
  if (!touchingNPC) {
    for (const crowd of room.crowds) {
      for (const m of crowd.members) {
        if (dist(player.x, player.y, crowd.x + m.ox, crowd.y + m.oy) < 0.7) { touchingNPC = true; break; }
      }
      if (touchingNPC) break;
    }
  }
  if (touchingNPC) speedMult *= 0.3;

  if (player.moving) {
    const len = Math.sqrt(dx*dx + dy*dy);
    dx /= len; dy /= len;
    const spd = player.speed * speedMult;
    player.x += dx * spd * dt;
    player.y += dy * spd * dt;
    player.facing = { x: dx, y: dy };
    player.bobPhase += dt * 10;
    if (!exhausted) player.stamina -= 8 * dt;
    player.thirst -= 3 * dt;
  } else {
    player.thirst -= 0.5 * dt;
  }

  // Stamina regen
  if (!player.moving) {
    player.stamina += 5 * fx.staminaRegen * dt;
  } else if (fx.staminaRegen > 1) {
    player.stamina += 3 * fx.staminaRegen * dt;
  }

  player.stamina = clamp(player.stamina, 0, player.maxStamina);
  player.thirst = clamp(player.thirst, 0, player.maxThirst);

  player.x = clamp(player.x, 0.5, ROOM_TILES - 0.5);
  player.y = clamp(player.y, 0.5, ROOM_TILES - 0.5);

  // Wall collision (hard)
  for (const w of room.walls) {
    const d = dist(player.x, player.y, w.tx+0.5, w.ty+0.5);
    if (d < 0.7 && d > 0.01) {
      const push = 0.7 - d;
      player.x += ((player.x - (w.tx+0.5)) / d) * push;
      player.y += ((player.y - (w.ty+0.5)) / d) * push;
    }
  }

  // Obstacle collision (hard)
  for (const o of room.obstacles) {
    const d = dist(player.x, player.y, o.tx+0.5, o.ty+0.5);
    if (d < 0.7 && d > 0.01) {
      const push = 0.7 - d;
      player.x += ((player.x - (o.tx+0.5)) / d) * push;
      player.y += ((player.y - (o.ty+0.5)) / d) * push;
    }
  }

  // Bar counter collision
  if (rk === BAR_ROOM) {
    for (let seg = -1; seg <= 1; seg++) {
      const bx = BAR_POS.x + seg * 0.9;
      const by = BAR_POS.y + seg * 0.45;
      const d = dist(player.x, player.y, bx, by);
      if (d < 0.8 && d > 0.01) {
        const push = 0.8 - d;
        player.x += ((player.x - bx) / d) * push;
        player.y += ((player.y - by) / d) * push;
      }
    }
  }

  // Door check
  for (const door of room.doors) {
    const dd = DOOR[door];
    if (Math.abs(player.x - (dd.tx+0.5)) < 1 && Math.abs(player.y - (dd.ty+0.5)) < 1) {
      startTransition(door);
      break;
    }
  }

  // Walk-over item pickup
  if (room.item && !room.item.picked && !player.heldItems.includes(room.item.id)) {
    if (dist(player.x, player.y, room.item.tx, room.item.ty) < 1.0) {
      room.item.picked = true;
      doPickup(room.item);
    }
  }
  for (let i = room.droppedItems.length - 1; i >= 0; i--) {
    const di = room.droppedItems[i];
    if (!di.picked && !player.heldItems.includes(di.id) && dist(player.x, player.y, di.tx, di.ty) < 1.0) {
      di.picked = true;
      room.droppedItems.splice(i, 1);
      doPickup(di);
    }
  }

  // Find nearest talkable NPC
  nearTalkable = null;
  let nearTalkDist = 2.0;
  for (const npc of room.npcs) {
    if (!npc.talkable) continue;
    if (npc.hidden && !fx.revealNPCs) continue;
    const d = dist(player.x, player.y, npc.x, npc.y);
    if (d < nearTalkDist) {
      nearTalkDist = d;
      nearTalkable = npc;
    }
  }

  // Bar proximity
  const roomKey = `${currentRoom.x},${currentRoom.y}`;
  nearBar = roomKey === BAR_ROOM && dist(player.x, player.y, BAR_POS.x, BAR_POS.y) < 2.0;
  document.getElementById('bar-prompt').style.opacity = (nearBar && !barMenuOpen) ? '1' : '0';

  // Close bar menu if walked away
  if (barMenuOpen && !nearBar) closeBarMenu();

  // Wallet display
  document.getElementById('wallet-display').textContent = `€${player.euros}`;

  // NPC movement
  for (const npc of room.npcs) {
    npc.x += npc.vx * dt;
    npc.y += npc.vy * dt;
    npc.phase += dt * 2;
    if (npc.x < 1.5 || npc.x > 9.5) npc.vx *= -1;
    if (npc.y < 1.5 || npc.y > 9.5) npc.vy *= -1;
    npc.x = clamp(npc.x, 1.5, 9.5);
    npc.y = clamp(npc.y, 1.5, 9.5);
    if (Math.random() < 0.005) {
      npc.vx = (Math.random()-0.5) * (npc.hidden ? 0.15 : 0.5);
      npc.vy = (Math.random()-0.5) * (npc.hidden ? 0.15 : 0.5);
    }
  }

  // UI
  document.getElementById('stamina-bar').style.width = `${(player.stamina/player.maxStamina)*100}%`;
  document.getElementById('thirst-bar').style.width = `${(player.thirst/player.maxThirst)*100}%`;
  document.getElementById('thirst-warning').style.opacity = player.thirst <= 0 ? '1' : '0';

  if (player.heldItems.includes('sunglasses')) {
    const pulse = 0.3 + Math.sin(performance.now()/400) * 0.15;
    document.getElementById('stamina-outer').style.boxShadow =
      `0 0 ${8+pulse*10}px rgba(78,205,196,${pulse}), 0 0 ${16+pulse*10}px rgba(78,205,196,${pulse*0.5})`;
  } else {
    document.getElementById('stamina-outer').style.boxShadow = '';
  }

  const names = [['Main Floor','VIP Booth'],['Lounge','DJ Booth']];
  document.getElementById('room-name').textContent = names[currentRoom.y][currentRoom.x];

  draw();
  requestAnimationFrame(update);
}

// ── DRAW ──
function drawIsoDiamond(cx, cy, w, h, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(cx, cy - h/2);
  ctx.lineTo(cx + w/2, cy);
  ctx.lineTo(cx, cy + h/2);
  ctx.lineTo(cx - w/2, cy);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1; ctx.stroke(); }
}

function drawNPCBody(iso, hue, lightness, h, bob, alpha) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(iso.sx, iso.sy+2, 9, 4.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = `hsl(${hue}, 30%, ${lightness}%)`;
  ctx.beginPath(); ctx.ellipse(iso.sx, iso.sy-9*h+bob, 6.5*h, 10*h, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = `hsl(${hue}, 15%, ${lightness+25}%)`;
  ctx.beginPath(); ctx.arc(iso.sx, iso.sy-20*h+bob, 4.5*h, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}

// Draw speech bubble above an NPC
function drawSpeechBubble(iso, h, bob, canTalk) {
  const bx = iso.sx + 8;
  const by = iso.sy - 26*h + bob - 6;
  const bw = 14, bh = 10;

  // Bubble
  ctx.fillStyle = canTalk ? 'rgba(255,255,255,0.85)' : 'rgba(80,80,80,0.6)';
  ctx.beginPath();
  ctx.moveTo(bx - bw/2 + 2, by - bh);
  ctx.lineTo(bx + bw/2 - 2, by - bh);
  ctx.quadraticCurveTo(bx + bw/2, by - bh, bx + bw/2, by - bh + 2);
  ctx.lineTo(bx + bw/2, by - 2);
  ctx.quadraticCurveTo(bx + bw/2, by, bx + bw/2 - 2, by);
  ctx.lineTo(bx - bw/2 + 2, by);
  ctx.quadraticCurveTo(bx - bw/2, by, bx - bw/2, by - 2);
  ctx.lineTo(bx - bw/2, by - bh + 2);
  ctx.quadraticCurveTo(bx - bw/2, by - bh, bx - bw/2 + 2, by - bh);
  ctx.fill();

  // Tail
  ctx.beginPath();
  ctx.moveTo(bx - 3, by);
  ctx.lineTo(bx - 1, by + 4);
  ctx.lineTo(bx + 2, by);
  ctx.fill();

  // Dots or X
  if (canTalk) {
    ctx.fillStyle = '#333';
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.arc(bx + i * 3, by - bh/2, 1, 0, Math.PI*2);
      ctx.fill();
    }
  } else {
    // X — can't talk (thirsty)
    ctx.strokeStyle = '#ff6b6b';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(bx - 3, by - bh + 2); ctx.lineTo(bx + 3, by - 2);
    ctx.moveTo(bx + 3, by - bh + 2); ctx.lineTo(bx - 3, by - 2);
    ctx.stroke();
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  const camIso = toIso(player.x, player.y);
  const camOx = W/2 - camIso.sx;
  const camOy = H/2 - camIso.sy - 60;

  ctx.save();
  ctx.translate(camOx, camOy);

  const room = getRoom();
  const fx = getEffects();
  const time = performance.now() / 1000;

  // Floor
  for (let ty = 0; ty < ROOM_TILES; ty++) {
    for (let tx = 0; tx < ROOM_TILES; tx++) {
      const iso = toIso(tx+0.5, ty+0.5);
      const checker = (tx+ty) % 2 === 0;
      const baseFill = room.floor[ty][tx] === 1 ? '#1e1e3a' : (checker ? '#131325' : '#16162a');
      drawIsoDiamond(iso.sx, iso.sy, TILE_W-2, TILE_H-2, baseFill, '#222240');
    }
  }

  // Entities for depth sort
  const entities = [];

  for (const w of room.walls)
    entities.push({ type: 'wall', x: w.tx+0.5, y: w.ty+0.5, data: w });

  // Bar counter in Lounge
  const rk = `${currentRoom.x},${currentRoom.y}`;
  if (rk === BAR_ROOM) {
    entities.push({ type: 'bar', x: BAR_POS.x, y: BAR_POS.y });
  }

  for (const o of room.obstacles)
    entities.push({ type: 'obstacle', x: o.tx+0.5, y: o.ty+0.5, data: o });
  for (const door of room.doors) {
    const dd = DOOR[door];
    entities.push({ type: 'door', x: dd.tx+0.5, y: dd.ty+0.5, data: door });
  }
  for (const npc of room.npcs)
    entities.push({ type: 'npc', x: npc.x, y: npc.y, data: npc });
  for (const crowd of room.crowds) {
    for (const m of crowd.members)
      entities.push({ type: 'crowd', x: crowd.x + m.ox, y: crowd.y + m.oy, data: m, crowd });
  }
  if (room.item && !room.item.picked)
    entities.push({ type: 'item', x: room.item.tx, y: room.item.ty, data: room.item });
  for (const di of room.droppedItems)
    if (!di.picked) entities.push({ type: 'item', x: di.tx, y: di.ty, data: di });
  entities.push({ type: 'player', x: player.x, y: player.y });

  entities.sort((a, b) => (a.x + a.y) - (b.x + b.y));

  for (const ent of entities) {
    const iso = toIso(ent.x, ent.y);

    if (ent.type === 'wall') {
      const wallH = 22;
      ctx.fillStyle = '#2a2a4e';
      ctx.beginPath();
      ctx.moveTo(iso.sx, iso.sy - wallH - TILE_H/2);
      ctx.lineTo(iso.sx + TILE_W/2, iso.sy - wallH);
      ctx.lineTo(iso.sx + TILE_W/2, iso.sy);
      ctx.lineTo(iso.sx, iso.sy + TILE_H/2);
      ctx.lineTo(iso.sx - TILE_W/2, iso.sy);
      ctx.lineTo(iso.sx - TILE_W/2, iso.sy - wallH);
      ctx.closePath();
      ctx.fill();
      drawIsoDiamond(iso.sx, iso.sy - wallH, TILE_W-2, TILE_H-2, '#3a3a5e', '#4a4a6e');
      ctx.fillStyle = '#222244';
      ctx.beginPath();
      ctx.moveTo(iso.sx, iso.sy - wallH + TILE_H/2 - 1);
      ctx.lineTo(iso.sx + TILE_W/2 - 1, iso.sy - wallH);
      ctx.lineTo(iso.sx + TILE_W/2 - 1, iso.sy);
      ctx.lineTo(iso.sx, iso.sy + TILE_H/2 - 1);
      ctx.closePath();
      ctx.fill();
    }

    if (ent.type === 'obstacle') {
      const o = ent.data;
      if (o.type === 'pillar') {
        ctx.fillStyle = '#3d3d5c';
        ctx.beginPath();
        ctx.moveTo(iso.sx-8, iso.sy); ctx.lineTo(iso.sx-8, iso.sy-30);
        ctx.lineTo(iso.sx+8, iso.sy-30); ctx.lineTo(iso.sx+8, iso.sy);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#4d4d6c';
        ctx.fillRect(iso.sx-10, iso.sy-34, 20, 6);
      } else if (o.type === 'speaker') {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(iso.sx-10, iso.sy-24, 20, 24);
        ctx.fillStyle = '#333';
        ctx.beginPath(); ctx.arc(iso.sx, iso.sy-12, 6, 0, Math.PI*2); ctx.fill();
        const pulse = Math.sin(time*8)*0.3 + 0.5;
        ctx.strokeStyle = `rgba(160,80,255,${pulse*0.4})`;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(iso.sx, iso.sy-12, 8+pulse*3, 0, Math.PI*2); ctx.stroke();
      } else {
        ctx.fillStyle = '#4a3a2a';
        ctx.beginPath(); ctx.ellipse(iso.sx, iso.sy, 10, 5, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#5a4a3a'; ctx.fillRect(iso.sx-10, iso.sy-16, 20, 16);
        ctx.fillStyle = '#6a5a4a';
        ctx.beginPath(); ctx.ellipse(iso.sx, iso.sy-16, 10, 5, 0, 0, Math.PI*2); ctx.fill();
      }
    }

    if (ent.type === 'door') {
      drawIsoDiamond(iso.sx, iso.sy, TILE_W*1.5, TILE_H*1.5,
        `rgba(78,205,196,${0.06 + Math.sin(time*3)*0.03})`);
      ctx.fillStyle = `rgba(78,205,196,${0.35 + Math.sin(time*4)*0.2})`;
      ctx.font = '16px monospace'; ctx.textAlign = 'center';
      ctx.fillText({N:'▲',S:'▼',E:'▶',W:'◀'}[ent.data], iso.sx, iso.sy+5);
    }

    if (ent.type === 'bar') {
      // Bar counter — long isometric counter
      const bh = 16;
      // Counter top
      for (let seg = -1; seg <= 1; seg++) {
        const sx = iso.sx + seg * (TILE_W * 0.45);
        const sy = iso.sy + seg * (TILE_H * 0.22);
        // Front face
        ctx.fillStyle = '#2a1a3a';
        ctx.beginPath();
        ctx.moveTo(sx - TILE_W/4, sy - bh);
        ctx.lineTo(sx + TILE_W/4, sy - bh - TILE_H/4);
        ctx.lineTo(sx + TILE_W/4, sy - TILE_H/4);
        ctx.lineTo(sx - TILE_W/4, sy);
        ctx.closePath();
        ctx.fill();
        // Top face
        drawIsoDiamond(sx, sy - bh - TILE_H/8, TILE_W/2 - 2, TILE_H/2 - 2, '#3d2a55', '#4d3a65');
      }
      // Sign
      ctx.fillStyle = '#a855f7';
      ctx.font = 'bold 10px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('BAR', iso.sx, iso.sy - bh - TILE_H/4 - 4);
      // Bottles on counter
      const bottles = ['🍾', '🥃', '🍸'];
      for (let i = 0; i < 3; i++) {
        const bsx = iso.sx + (i - 1) * 14;
        const bsy = iso.sy - bh - TILE_H/4 + 2;
        ctx.font = '10px serif';
        ctx.fillText(bottles[i], bsx, bsy);
      }
      // Glow when near
      if (nearBar) {
        ctx.strokeStyle = `rgba(168,85,247,${0.3 + Math.sin(time*3)*0.15})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(iso.sx, iso.sy - bh/2, TILE_W * 0.8, TILE_H * 0.6, 0, 0, Math.PI*2);
        ctx.stroke();
      }
    }

    if (ent.type === 'npc') {
      const npc = ent.data;
      const bob = Math.sin(npc.phase) * 2;
      const h = npc.height;

      if (npc.hidden && !fx.revealNPCs) {
        ctx.globalAlpha = 0.18 + Math.sin(time*1.5 + npc.phase) * 0.05;
        ctx.fillStyle = '#0a0a15';
        ctx.beginPath(); ctx.ellipse(iso.sx, iso.sy+2, 8, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(iso.sx, iso.sy-8*h+bob*0.3, 6*h, 9*h, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(iso.sx, iso.sy-18*h+bob*0.3, 4*h, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
      } else {
        const isRevealed = npc.hidden && fx.revealNPCs;
        drawNPCBody(iso, npc.hue, npc.lightness, h, bob, isRevealed ? 0.55 : 0.85);
        if (isRevealed) {
          ctx.strokeStyle = `rgba(168,85,247,${0.25 + Math.sin(time*5 + npc.phase)*0.15})`;
          ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.arc(iso.sx, iso.sy-12*h+bob, 12*h, 0, Math.PI*2); ctx.stroke();
        }

        // Speech bubble for talkable NPCs near the player
        if (npc.talkable && dist(player.x, player.y, npc.x, npc.y) < 2.0) {
          const canTalk = player.thirst > 0;
          drawSpeechBubble(iso, h, bob, canTalk);

          // [E] prompt
          if (canTalk && npc === nearTalkable) {
            ctx.fillStyle = `rgba(78,205,196,${0.6 + Math.sin(time*4)*0.3})`;
            ctx.font = 'bold 9px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('[E]', iso.sx + 8, iso.sy - 26*h + bob - 18);
          }
        }
      }
    }

    if (ent.type === 'crowd') {
      const m = ent.data;
      // Huddled dancing — jumping up and down together, synced with slight offset
      const jumpPhase = time * 5 + m.phase;
      const jump = Math.abs(Math.sin(jumpPhase)) * 4; // always positive = bouncing up
      const sway = Math.sin(time * 2.5 + m.phase * 1.3) * 1.5;
      const danceIso = { sx: iso.sx + sway, sy: iso.sy };
      drawNPCBody(danceIso, m.hue, m.lightness, m.height, jump, 0.8);
    }

    if (ent.type === 'item') {
      const item = ent.data;
      const float = Math.sin(time*2.5) * 4;
      const glow = 0.3 + Math.sin(time*3) * 0.15;
      ctx.fillStyle = `rgba(255,217,61,${glow*0.25})`;
      ctx.beginPath(); ctx.arc(iso.sx, iso.sy, 22, 0, Math.PI*2); ctx.fill();
      ctx.font = '26px serif'; ctx.textAlign = 'center';
      ctx.fillText(item.icon, iso.sx, iso.sy - 10 + float);
      ctx.font = 'bold 10px Courier New';
      ctx.fillStyle = item.color;
      ctx.fillText(item.name, iso.sx, iso.sy + 12);
    }

    if (ent.type === 'player') {
      const bob = player.moving ? Math.sin(player.bobPhase) * 3 : 0;
      const exhausted = player.stamina <= 0;

      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.beginPath(); ctx.ellipse(iso.sx, iso.sy+2, 12, 6, 0, 0, Math.PI*2); ctx.fill();

      ctx.fillStyle = exhausted ? '#999' : '#e8e8e8';
      ctx.beginPath(); ctx.ellipse(iso.sx, iso.sy-10+bob, 8, 12, 0, 0, Math.PI*2); ctx.fill();

      ctx.fillStyle = exhausted ? '#bbb' : '#fff';
      ctx.beginPath(); ctx.arc(iso.sx, iso.sy-24+bob, 6, 0, Math.PI*2); ctx.fill();

      const ex = player.facing.x * 2, ey = player.facing.y;
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(iso.sx-2+ex, iso.sy-25+bob+ey, 1.5, 0, Math.PI*2);
      ctx.arc(iso.sx+2+ex, iso.sy-25+bob+ey, 1.5, 0, Math.PI*2);
      ctx.fill();

      // Thirst 0: X on mouth
      if (player.thirst <= 0) {
        ctx.strokeStyle = '#ff6b6b';
        ctx.lineWidth = 1.5;
        const mx = iso.sx, my = iso.sy - 21 + bob;
        ctx.beginPath(); ctx.moveTo(mx-2, my-1.5); ctx.lineTo(mx+2, my+1.5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(mx+2, my-1.5); ctx.lineTo(mx-2, my+1.5); ctx.stroke();
      }

      if (player.moving && player.heldItems.includes('tablet')) {
        ctx.strokeStyle = 'rgba(78,205,196,0.3)'; ctx.lineWidth = 1;
        for (let i = 0; i < 3; i++) {
          const ox = -player.facing.x*(10+i*6), oy = -player.facing.y*(5+i*3);
          ctx.beginPath();
          ctx.moveTo(iso.sx+ox-4, iso.sy-10+bob+oy+i*4);
          ctx.lineTo(iso.sx+ox+4, iso.sy-10+bob+oy+i*4);
          ctx.stroke();
        }
      }

      if (player.heldItems.includes('drink')) {
        ctx.strokeStyle = `rgba(168,85,247,${0.12 + Math.sin(time*3)*0.08})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(iso.sx, iso.sy-10, 28+Math.sin(time*2)*3, 0, Math.PI*2); ctx.stroke();
      }

      if (player.heldItems.includes('sunglasses')) {
        ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(iso.sx-6, iso.sy-25+bob); ctx.lineTo(iso.sx+6, iso.sy-25+bob); ctx.stroke();
        ctx.strokeStyle = 'rgba(251,191,36,0.4)';
        ctx.beginPath(); ctx.rect(iso.sx-6, iso.sy-27+bob, 5, 4); ctx.rect(iso.sx+1, iso.sy-27+bob, 5, 4); ctx.stroke();
      }

      if (exhausted) {
        ctx.fillStyle = `rgba(78,205,196,${0.5 + Math.sin(time*6)*0.3})`;
        ctx.font = '10px Courier New'; ctx.textAlign = 'center';
        ctx.fillText('exhausted', iso.sx, iso.sy - 34 + bob);
      }
    }
  }

  ctx.restore();

  // Overlays
  if (transitioning) {
    ctx.fillStyle = `rgba(0,0,0,${transAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }

  if (player.stamina < 25) {
    const intensity = 1 - (player.stamina / 25);
    const grad = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.7);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, `rgba(0,0,0,${intensity*0.5})`);
    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  }

  if (getEffects().darken) {
    const pulse = 0.35 + Math.sin(performance.now()/1500) * 0.05;
    ctx.fillStyle = `rgba(0,0,0,${pulse})`;
    ctx.fillRect(0, 0, W, H);
  }

  if (player.thirst < 20) {
    const intensity = 1 - (player.thirst / 20);
    const grad = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.7);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, `rgba(120,20,20,${intensity*0.4})`);
    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  }
}

// ── INIT ──
generateRoom(0, 0);
requestAnimationFrame(update);
</script>
</body>
</html>
