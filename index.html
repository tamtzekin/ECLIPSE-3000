<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Club Dungeon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; position: absolute; top: 0; left: 0; }

#fx-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
#fx-overlay > div { position: absolute; inset: 0; }
#fx-transition { background: #000; }
#fx-stamina { background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%); }
#fx-darken { background: #000; }
#fx-thirst { background: radial-gradient(ellipse at center, transparent 30%, rgba(120,20,20,0.5) 100%); }
#fx-red { background: rgba(160,20,20,0.6); }
#interact-3d { position: fixed; transform: translate(-50%, -100%); color: #4ecdc4; font-size: 12px; font-weight: bold; font-family: 'Courier New', monospace; z-index: 10; pointer-events: none; transition: opacity 0.15s; letter-spacing: 1px; text-shadow: 0 0 8px rgba(78,205,196,0.5); }
#fx-effects { position: fixed; left: 20px; top: 50%; color: #4ecdc4; font-size: 11px; font-weight: bold; font-family: 'Courier New', monospace; z-index: 10; pointer-events: none; letter-spacing: 1px; }

/* ── STAMINA (top-left) ── */
#stamina-ui {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 10;
  width: 220px;
}

#stamina-ui .bar-label {
  color: #4ecdc4;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-bottom: 5px;
  font-weight: bold;
}

#stamina-ui .bar-outer {
  width: 100%;
  height: 18px;
  background: #1a1a2e;
  border: 1px solid #333;
  overflow: hidden;
}

#stamina-bar {
  height: 100%;
  background: #4ecdc4;
  transition: width 0.15s ease;
}

#stamina-ui.glow .bar-outer {
  box-shadow: 0 0 10px rgba(78,205,196,0.5), 0 0 20px rgba(78,205,196,0.3);
  border-color: #4ecdc4;
}

#stamina-msg {
  color: #4ecdc4;
  font-size: 10px;
  margin-top: 4px;
  opacity: 0;
  transition: opacity 0.3s;
  letter-spacing: 1px;
}

/* ── THIRST (top-right) ── */
#thirst-ui {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10;
  width: 220px;
  text-align: right;
}

#thirst-ui .bar-label {
  color: #ff6b6b;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-bottom: 5px;
  font-weight: bold;
}

#thirst-ui .bar-outer {
  width: 100%;
  height: 18px;
  background: #1a1a2e;
  border: 1px solid #333;
  overflow: hidden;
}

#thirst-bar {
  height: 100%;
  background: #ff6b6b;
  transition: width 0.15s ease;
  float: right;
}

#thirst-msg {
  color: #ff6b6b;
  font-size: 10px;
  margin-top: 4px;
  opacity: 0;
  transition: opacity 0.3s;
  letter-spacing: 1px;
}

/* ── INVENTORY SLOTS (triangle) ── */
#inventory {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

#inv-top { display: flex; justify-content: center; }
#inv-bottom { display: flex; gap: 6px; }

.inv-slot {
  width: 60px;
  height: 60px;
  background: rgba(20, 20, 40, 0.85);
  border: 1px solid #444;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}

.inv-slot.empty {
  cursor: default;
  border-style: dashed;
  border-color: #333;
}

.inv-slot:not(.empty):hover {
  border-color: #4ecdc4;
  background: rgba(30, 30, 55, 0.9);
}

.inv-slot .slot-icon { font-size: 22px; }
.inv-slot .slot-label {
  font-size: 7px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 2px;
}

.inv-slot.unequipped {
  opacity: 0.4;
  border-style: dashed;
}

.inv-slot.drink-slot:hover { border-color: #a855f7; }

/* ── MINIMAP ── */
#minimap-ui {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 10;
}

#minimap {
  display: grid;
  grid-template-columns: repeat(2, 22px);
  grid-template-rows: repeat(2, 22px);
  gap: 2px;
}

.minimap-cell { width: 22px; height: 22px; background: #1a1a2e; border: 1px solid #333; }
.minimap-cell.current { background: #4ecdc4; border-color: #4ecdc4; }
.minimap-cell.visited { background: #2a2a4e; }

#room-name {
  color: #666;
  font-size: 10px;
  letter-spacing: 1px;
  margin-top: 4px;
}

/* ── DIALOGUE ── */
#dialogue-box {
  position: fixed;
  top: 0;
  right: 0;
  width: 320px;
  height: 100vh;
  background: rgba(6, 6, 14, 0.96);
  border-left: 1px solid #3a3a5a;
  z-index: 25;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  transform: translateX(20px);
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
}

#dialogue-box.open {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(0);
}

#dialogue-header {
  padding: 16px 20px;
  border-bottom: 1px solid #2a2a4a;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

#dialogue-portrait {
  width: 52px;
  height: 52px;
  border: 2px solid #555;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  background: rgba(15,15,30,0.9);
  flex-shrink: 0;
}

#dialogue-name {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 3px;
  font-weight: bold;
}

#dialogue-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  scrollbar-width: thin;
  scrollbar-color: #3a3a5a transparent;
}

#dialogue-scroll::-webkit-scrollbar { width: 4px; }
#dialogue-scroll::-webkit-scrollbar-track { background: transparent; }
#dialogue-scroll::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 2px; }

.dialogue-entry {
  padding: 12px 20px;
  border-bottom: 1px solid rgba(60,60,90,0.3);
}

.dialogue-entry .de-speaker {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 4px;
  opacity: 0.6;
}

.dialogue-entry .de-text {
  color: #ccc;
  font-size: 12px;
  line-height: 1.7;
}

.dialogue-entry.de-player .de-text {
  color: #4ecdc4;
  font-style: italic;
}

.dialogue-entry.de-player .de-speaker {
  color: #4ecdc4;
}

#dialogue-choices {
  padding: 8px 0;
  border-top: 1px solid #2a2a4a;
  flex-shrink: 0;
}

.dialogue-choice {
  padding: 10px 20px;
  color: #888;
  font-size: 11px;
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
  display: flex;
  gap: 8px;
  line-height: 1.5;
}

.dialogue-choice:hover {
  background: rgba(78,205,196,0.08);
  color: #4ecdc4;
}

.dialogue-choice .choice-num {
  color: #4ecdc4;
  min-width: 18px;
  flex-shrink: 0;
}

/* ── PICKUP FLASH ── */
#pickup-flash {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ffd93d;
  font-size: 16px;
  letter-spacing: 2px;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
  text-shadow: 0 0 10px rgba(255,217,61,0.5);
}

/* ── BAR MENU ── */
#bar-menu {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(8, 8, 18, 0.97);
  border: 1px solid #555;
  z-index: 30;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  min-width: 300px;
}

#bar-menu.open { opacity: 1; pointer-events: auto; }

#bar-menu .bar-header {
  background: rgba(30,20,50,0.9);
  padding: 10px 16px;
  border-bottom: 1px solid #444;
  display: flex;
  justify-content: space-between;
}

#bar-menu .bar-title { color: #a855f7; font-size: 12px; text-transform: uppercase; letter-spacing: 3px; }
#bar-menu .bar-wallet { color: #fbbf24; font-size: 12px; }

.bar-item {
  padding: 8px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: background 0.1s;
  color: #ccc;
  font-size: 12px;
}

.bar-item:hover { background: rgba(168,85,247,0.15); }
.bar-item.cant-afford { color: #555; cursor: default; }
.bar-item .drink-name { display: flex; align-items: center; gap: 8px; }
.bar-item .drink-effect { font-size: 9px; color: #888; }
.bar-item .drink-price { color: #fbbf24; font-size: 11px; }
.bar-item.cant-afford .drink-price { color: #555; }

#bar-menu .bar-close { padding: 6px 16px; text-align: center; color: #666; font-size: 10px; border-top: 1px solid #333; letter-spacing: 1px; }

#bar-prompt {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  color: #a855f7;
  font-size: 12px;
  letter-spacing: 1px;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

#coat-prompt {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  color: #e8a87c;
  font-size: 12px;
  letter-spacing: 1px;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

#coat-menu {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(8,8,18,0.97);
  border: 1px solid #555;
  z-index: 25;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  min-width: 260px;
  font-family: 'Courier New', monospace;
}
#coat-menu.open { opacity: 1; pointer-events: auto; }

#wallet-display {
  position: fixed;
  bottom: 20px;
  right: 20px;
  color: #fbbf24;
  font-size: 13px;
  letter-spacing: 1px;
  z-index: 10;
}

#token-display {
  position: fixed;
  bottom: 38px;
  right: 20px;
  color: #ffd93d;
  font-size: 13px;
  letter-spacing: 1px;
  z-index: 10;
}

#game-audio { display: none; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<!-- STAMINA top-left -->
<div id="stamina-ui">
  <div class="bar-label">Stamina</div>
  <div class="bar-outer"><div id="stamina-bar"></div></div>
  <div id="stamina-msg"></div>
</div>

<!-- THIRST top-right -->
<div id="thirst-ui">
  <div class="bar-label">Thirst</div>
  <div class="bar-outer"><div id="thirst-bar"></div></div>
  <div id="thirst-msg"></div>
</div>

<!-- INVENTORY triangle -->
<div id="inventory">
  <div id="inv-top"></div>
  <div id="inv-bottom"></div>
</div>

<!-- MINIMAP bottom-left -->
<div id="minimap-ui">
  <div id="minimap"></div>
  <div id="room-name"></div>
</div>

<div id="wallet-display"></div>
<div id="token-display"></div>
<div id="pickup-flash"></div>
<div id="bar-prompt">[E] ORDER AT BAR</div>

<div id="bar-menu">
  <div class="bar-header"><span class="bar-title">BAR</span><span class="bar-wallet"></span></div>
  <div class="bar-items"></div>
  <div class="bar-close">ESC to close</div>
</div>

<div id="coat-prompt">[E] COAT CHECK</div>

<div id="coat-menu">
  <div class="bar-header"><span class="bar-title">COAT CHECK</span><span class="coat-tokens">🪙 0</span></div>
  <div class="coat-items"></div>
  <div class="bar-close">ESC to close</div>
</div>

<div id="dialogue-box">
  <div id="dialogue-header">
    <div id="dialogue-portrait"></div>
    <div id="dialogue-name"></div>
  </div>
  <div id="dialogue-scroll"></div>
  <div id="dialogue-choices"></div>
</div>

<div id="fx-overlay">
  <div id="fx-transition" style="opacity:0"></div>
  <div id="fx-stamina" style="opacity:0"></div>
  <div id="fx-darken" style="opacity:0"></div>
  <div id="fx-thirst" style="opacity:0"></div>
  <div id="fx-red" style="opacity:0"></div>
</div>
<div id="interact-3d" style="opacity:0"></div>
<div id="fx-effects"></div>

<audio id="game-audio" src="music.mp3" loop preload="auto"></audio>
<script src="three.min.js"></script>
<script>
// ── AUDIO ──
let audioStarted = false;
function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  const audio = document.getElementById('game-audio');
  audio.volume = 0.4;
  audio.play().catch(()=>{});
}
document.addEventListener('keydown', function a() { startAudio(); document.removeEventListener('keydown', a); }, { once: true });
document.addEventListener('click', function a() { startAudio(); document.removeEventListener('click', a); }, { once: true });

// ── THREE.JS ENGINE ──
const ROOM_TILES = 15;
const WALL_HEIGHT = 2.5;

const canvas = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
let W = innerWidth, H = innerHeight;
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x050510, 0.04);

const camera = new THREE.PerspectiveCamera(50, W / H, 0.1, 100);

function resize() {
  W = innerWidth; H = innerHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
}
addEventListener('resize', resize);

function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }

// ── FIXED CAMERA PER ROOM (RE-style) ──
const ROOM_CAMERAS = {
  '0,0': { pos: [16, 11, 16], look: [7.5, 0, 7.5] },
  '1,0': { pos: [-1, 10, 15], look: [7.5, 0, 7] },
  '0,1': { pos: [15, 12, -1], look: [7, 0, 8] },
  '1,1': { pos: [-1, 11, -1], look: [7.5, 0, 7.5] },
};
let camForward = new THREE.Vector3();
let camRight = new THREE.Vector3();

function setCameraForRoom(rx, ry) {
  const c = ROOM_CAMERAS[`${rx},${ry}`] || ROOM_CAMERAS['0,0'];
  camera.position.set(c.pos[0], c.pos[1], c.pos[2]);
  camera.lookAt(c.look[0], c.look[1], c.look[2]);
  camera.updateMatrixWorld();
  camera.getWorldDirection(camForward);
  camForward.y = 0;
  camForward.normalize();
  camRight.crossVectors(camForward, new THREE.Vector3(0, 1, 0)).normalize();
}

// ── LIGHTING ──
const ambientLight = new THREE.AmbientLight(0x2a2a5a, 0.8);
scene.add(ambientLight);
const playerLight = new THREE.PointLight(0x4ecdc4, 1.5, 15);
playerLight.position.set(7.5, 2.5, 7.5);
scene.add(playerLight);
// Extra fill light from above to see the room
const fillLight = new THREE.DirectionalLight(0x222244, 0.4);
fillLight.position.set(7.5, 15, 7.5);
scene.add(fillLight);
const bpmLight1 = new THREE.PointLight(0xc8b4ff, 0, 20);
bpmLight1.position.set(4, 4, 4);
scene.add(bpmLight1);
const bpmLight2 = new THREE.PointLight(0xb4dcff, 0, 20);
bpmLight2.position.set(11, 4, 11);
scene.add(bpmLight2);

// ── LOW-POLY MESH HELPERS ──
function makeCharMesh(hue, lightness, h) {
  const g = new THREE.Group();
  const bodyH = h * 0.7;
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.18, 0.24, bodyH, 6),
    new THREE.MeshPhongMaterial({ color: new THREE.Color(`hsl(${hue},30%,${lightness}%)`), flatShading: true })
  );
  body.position.y = bodyH / 2;
  g.add(body);
  const headR = h * 0.15;
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(headR, 5, 4),
    new THREE.MeshPhongMaterial({ color: new THREE.Color(`hsl(${hue},15%,${Math.min(100, lightness + 25)}%)`), flatShading: true })
  );
  head.position.y = bodyH + headR * 0.9;
  g.add(head);
  const shadow = new THREE.Mesh(
    new THREE.CircleGeometry(0.22, 6),
    new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 })
  );
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = 0.01;
  g.add(shadow);
  g.userData = { body, head, shadow, bodyH, headR };
  return g;
}

// ── ROOM 3D BUILDER ──
let roomGroup = null;
const entityGroup = new THREE.Group();
scene.add(entityGroup);

const npcPool = [];
const crowdPool = [];
const itemPool = [];
const tokenPool = [];

function ensurePool(pool, count, creator) {
  while (pool.length < count) {
    const m = creator();
    m.visible = false;
    entityGroup.add(m);
    pool.push(m);
  }
}

function buildRoom3D(room) {
  if (roomGroup) { scene.remove(roomGroup); roomGroup.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); }); }
  roomGroup = new THREE.Group();

  // Floor — canvas texture for checker pattern
  const texCvs = document.createElement('canvas');
  texCvs.width = ROOM_TILES * 4; texCvs.height = ROOM_TILES * 4;
  const tc = texCvs.getContext('2d');
  for (let ty = 0; ty < ROOM_TILES; ty++) for (let tx = 0; tx < ROOM_TILES; tx++) {
    const ch = (tx + ty) % 2 === 0;
    tc.fillStyle = room.floor[ty][tx] === 1 ? '#1e1e3a' : (ch ? '#16162a' : '#131325');
    tc.fillRect(tx * 4, ty * 4, 4, 4);
  }
  const floorTex = new THREE.CanvasTexture(texCvs);
  floorTex.magFilter = THREE.NearestFilter;
  floorTex.minFilter = THREE.NearestFilter;
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(ROOM_TILES, ROOM_TILES),
    new THREE.MeshPhongMaterial({ map: floorTex, flatShading: true })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.set(ROOM_TILES / 2, 0, ROOM_TILES / 2);
  roomGroup.add(floor);

  // Walls
  const wallMat = new THREE.MeshPhongMaterial({ color: 0x2a2a4e, flatShading: true });
  for (const w of room.walls) {
    const wall = new THREE.Mesh(new THREE.BoxGeometry(1, WALL_HEIGHT, 1), wallMat);
    wall.position.set(w.tx + 0.5, WALL_HEIGHT / 2, w.ty + 0.5);
    roomGroup.add(wall);
  }

  // Obstacles
  for (const o of room.obstacles) {
    let m;
    if (o.type === 'pillar') {
      m = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.3, WALL_HEIGHT + 0.5, 6), new THREE.MeshPhongMaterial({ color: 0x3d3d5c, flatShading: true }));
      m.position.set(o.tx + 0.5, (WALL_HEIGHT + 0.5) / 2, o.ty + 0.5);
    } else if (o.type === 'speaker') {
      m = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.6), new THREE.MeshPhongMaterial({ color: 0x1a1a1a, flatShading: true }));
      m.position.set(o.tx + 0.5, 0.6, o.ty + 0.5);
      const ring = new THREE.Mesh(new THREE.RingGeometry(0.15, 0.25, 8), new THREE.MeshBasicMaterial({ color: 0xa050ff, transparent: true, opacity: 0.4, side: THREE.DoubleSide }));
      ring.position.set(0, 0.3, 0.31);
      m.add(ring);
    } else {
      m = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.35, 0.7, 8), new THREE.MeshPhongMaterial({ color: 0x5a4a3a, flatShading: true }));
      m.position.set(o.tx + 0.5, 0.35, o.ty + 0.5);
    }
    roomGroup.add(m);
  }

  // Doors — glowing floor markers
  for (const door of room.doors) {
    const dd = DOOR[door];
    const dm = new THREE.Mesh(
      new THREE.PlaneGeometry(2.2, 2.2),
      new THREE.MeshBasicMaterial({ color: 0x4ecdc4, transparent: true, opacity: 0.1, side: THREE.DoubleSide })
    );
    dm.rotation.x = -Math.PI / 2;
    dm.position.set(dd.tx + 0.5, 0.02, dd.ty + 0.5);
    roomGroup.add(dm);
    const arrow = new THREE.Mesh(
      new THREE.ConeGeometry(0.25, 0.5, 4),
      new THREE.MeshBasicMaterial({ color: 0x4ecdc4, transparent: true, opacity: 0.4 })
    );
    arrow.position.set(dd.tx + 0.5, 0.4, dd.ty + 0.5);
    if (door === 'N') arrow.rotation.x = 0;
    else if (door === 'S') arrow.rotation.x = Math.PI;
    else if (door === 'E') { arrow.rotation.x = 0; arrow.rotation.z = -Math.PI / 2; }
    else { arrow.rotation.x = 0; arrow.rotation.z = Math.PI / 2; }
    roomGroup.add(arrow);
  }

  // Bar counter
  const rk = `${room.rx},${room.ry}`;
  if (rk === BAR_ROOM) {
    const bar = new THREE.Mesh(
      new THREE.BoxGeometry(2.8, 0.9, 0.7),
      new THREE.MeshPhongMaterial({ color: 0x3d2a55, flatShading: true })
    );

const ARTICY_PLAYER_ID = '0x0100000000010000';
const ARTICY_NPC_ID = '0x0100000000010001';
let articyDB = null; // loaded async

class ArticyRuntime {
  constructor(json) {
    this.nodes = new Map();    // Id -> model properties
    this.dialogues = [];       // top-level Dialogue container IDs
    const models = json.Packages[0].Models;
    for (const m of models) {
      const p = m.Properties;
      p._type = m.Type;
      this.nodes.set(p.Id, p);
      if (m.Type === 'Dialogue') this.dialogues.push(p.Id);
    }
  }
  // Get the first DialogueFragment child of a Dialogue container
  getEntryNode(dialogueId) {
    const dlg = this.nodes.get(dialogueId);
    if (!dlg || !dlg.OutputPins || !dlg.OutputPins[0]) return null;
    const conn = dlg.OutputPins[0].Connections[0];
    return conn ? this.nodes.get(conn.Target) : null;
  }
  // Get child choices/connections from a fragment's output pin
  getOutputs(fragmentId) {
    const frag = this.nodes.get(fragmentId);
    if (!frag || !frag.OutputPins || !frag.OutputPins[0]) return [];
    return frag.OutputPins[0].Connections.map(c => ({
      targetId: c.Target,
      target: this.nodes.get(c.Target)
    })).filter(o => o.target);
  }
  // Check if a fragment is an NPC line (has Text) vs player choice (has MenuText)
  isNPCLine(frag) { return frag.Speaker === ARTICY_NPC_ID || (frag.Text && !frag.MenuText); }
  isPlayerChoice(frag) { return !!frag.MenuText; }
  // Get a random dialogue ID
  randomDialogueId(rng) {
    return this.dialogues[Math.floor(rng() * this.dialogues.length)];
  }
}

function makeRng(seed) {
  let s = seed;
  return () => { s = (s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; };
}

function generateRoom(rx, ry) {
  const key = `${rx},${ry}`;
  if (rooms[key]) return rooms[key];
  const rand = makeRng(rx*7+ry*13+42);

  const doors = [];
  if (ry > 0) doors.push('N');
  if (ry < DH-1) doors.push('S');
  if (rx < DW-1) doors.push('E');
  if (rx > 0) doors.push('W');

  const floor = [];
  for (let ty=0;ty<ROOM_TILES;ty++) { floor[ty]=[]; for (let tx=0;tx<ROOM_TILES;tx++) floor[ty][tx]=rand()<0.08?1:0; }

  const walls = [];
  // Build wall set including irregular bumps
  const wallSet = new Set();
  for (let tx=0;tx<ROOM_TILES;tx++) for (let ty=0;ty<ROOM_TILES;ty++) {
    if (tx===0||ty===0||tx===ROOM_TILES-1||ty===ROOM_TILES-1) wallSet.add(`${tx},${ty}`);
  }
  // Add 2-4 irregular alcoves/bumps jutting inward
  const numBumps = 2 + Math.floor(rand()*3);
  for (let b=0;b<numBumps;b++) {
    const side = Math.floor(rand()*4); // 0=N,1=S,2=E,3=W
    const bw = 2 + Math.floor(rand()*3); // bump width
    const bd = 1 + Math.floor(rand()*2); // bump depth
    let bx, by;
    if (side===0) { bx=2+Math.floor(rand()*(ROOM_TILES-4-bw)); by=1; }
    else if (side===1) { bx=2+Math.floor(rand()*(ROOM_TILES-4-bw)); by=ROOM_TILES-2-bd; }
    else if (side===2) { bx=ROOM_TILES-2-bd; by=2+Math.floor(rand()*(ROOM_TILES-4-bw)); }
    else { bx=1; by=2+Math.floor(rand()*(ROOM_TILES-4-bw)); }
    for (let dx=0;dx<(side>=2?bd:bw);dx++) for (let dy=0;dy<(side>=2?bw:bd);dy++) {
      wallSet.add(`${bx+dx},${by+dy}`);
    }
  }
  // Remove door tiles from wall set, then build wall array
  for (const d of doors) { const dd=DOOR[d]; for (let ox=-1;ox<=1;ox++) for (let oy=-1;oy<=1;oy++) wallSet.delete(`${dd.tx+ox},${dd.ty+oy}`); }
  for (const ws of wallSet) { const [tx,ty]=ws.split(',').map(Number); walls.push({tx,ty}); }

  const npcs = [];
  const npcCount = 12+Math.floor(rand()*15);
  for (let i=0;i<npcCount;i++) {
    const hidden = rand()<0.45;
    let cx,cy;
    if (hidden&&npcs.length>0&&rand()<0.6) {
      const nb=npcs.filter(n=>n.hidden);
      if (nb.length>0) { const a=nb[Math.floor(rand()*nb.length)]; cx=a.x+(rand()-0.5)*1.2; cy=a.y+(rand()-0.5)*1.2; }
      else { cx=2+rand()*(ROOM_TILES-4); cy=2+rand()*(ROOM_TILES-4); }
    } else { cx=2+rand()*(ROOM_TILES-4); cy=2+rand()*(ROOM_TILES-4); }
    const talkable = !hidden && rand()<0.3;
    const dlgId = articyDB ? articyDB.randomDialogueId(rand) : null;
    npcs.push({
      x:clamp(cx,1.5,ROOM_TILES-1.5), y:clamp(cy,1.5,ROOM_TILES-1.5),
      vx:(rand()-0.5)*(hidden?0.15:0.5), vy:(rand()-0.5)*(hidden?0.15:0.5),
      hidden, hue:rand()*360, lightness:25+rand()*20,
      phase:rand()*Math.PI*2, height:0.7+rand()*0.4,
      talkable,
      name: talkable ? NPC_NAMES[Math.floor(rand()*NPC_NAMES.length)] : null,
      dialogueId: talkable ? dlgId : null,
      bubbleType: talkable ? (['?','!','?!'])[Math.floor(rand()*3)] : null,
    });
  }

  const crowds = [];
  const crowdCount = 2+Math.floor(rand()*3);
  for (let c=0;c<crowdCount;c++) {
    const cx=2.5+rand()*6, cy=2.5+rand()*6;
    const size=4+Math.floor(rand()*5);
    const members = [];
    for (let m=0;m<size;m++) {
      const angle=(m/size)*Math.PI*2+rand()*0.5;
      const r=0.4+rand()*0.6;
      members.push({ ox:Math.cos(angle)*r, oy:Math.sin(angle)*r, hue:rand()*360, lightness:30+rand()*25, phase:rand()*Math.PI*2, height:0.75+rand()*0.35 });
    }
    crowds.push({x:cx,y:cy,radius:1.3,members});
  }

  const itemId = ITEM_PLACEMENTS[key]||null;
  let item = null;
  if (itemId) { const def=ITEM_DEFS.find(d=>d.id===itemId); item={...def,tx:4+rand()*(ROOM_TILES-8),ty:4+rand()*(ROOM_TILES-8),picked:false}; }

  const obstacles = [];
  for (let i=0;i<1+Math.floor(rand()*3);i++)
    obstacles.push({tx:2+Math.floor(rand()*(ROOM_TILES-4)),ty:2+Math.floor(rand()*(ROOM_TILES-4)),type:rand()<0.4?'pillar':rand()<0.7?'speaker':'barrel'});

  // Tokens scattered on floor — numbered claim tickets
  const tokens = [];
  // 2 per room. One is a real clothing token, one may be wildcard or random
  const clothingIdx = (rx + ry * DW) % CLOTHING_DEFS.length;
  const realNum = CLOTHING_DEFS[clothingIdx].tokenNum;
  // Second token: 30% chance wildcard (one digit blurred), 70% random number
  let secondNum, secondWild = false;
  if (rand() < 0.3) {
    // Wildcard: pick a real clothing token number, blur one digit
    const wIdx = Math.floor(rand() * CLOTHING_DEFS.length);
    const wNum = CLOTHING_DEFS[wIdx].tokenNum;
    const digits = String(wNum).split('');
    const blurIdx = Math.floor(rand() * digits.length);
    digits[blurIdx] = '?';
    secondNum = digits.join('');
    secondWild = true;
  } else {
    secondNum = 10 + Math.floor(rand() * 90);
  }
  tokens.push({ tx:2+rand()*(ROOM_TILES-4), ty:2+rand()*(ROOM_TILES-4), picked:false, num:realNum, wild:false });
  tokens.push({ tx:2+rand()*(ROOM_TILES-4), ty:2+rand()*(ROOM_TILES-4), picked:false, num:secondNum, wild:secondWild });

  rooms[key] = { doors,floor,walls,npcs,crowds,item,obstacles,droppedItems:[],tokens,rx,ry };
  return rooms[key];
}

// ── DIALOGUE SYSTEM (Articy Draft runtime) ──
let dialogueCurrentNodeId = null; // current Articy fragment Id
let dialogueChoices = [];         // cached [{targetId, menuText}]

function openDialogue(npc) {
  if (!articyDB) return;
  // Charisma-unlocked NPCs may not have a dialogueId — assign one
  if (!npc.dialogueId) {
    npc.dialogueId = articyDB.dialogues[Math.floor(Math.random()*articyDB.dialogues.length)];
    if (!npc.name) npc.name = NPC_NAMES[Math.floor(Math.random()*NPC_NAMES.length)];
    if (!npc.bubbleType) npc.bubbleType = ['?','!','?!'][Math.floor(Math.random()*3)];
  }
  dialogueOpen = true;
  dialogueNPC = npc;
  // Get entry fragment from dialogue container
  const entry = articyDB.getEntryNode(npc.dialogueId);
  if (!entry) { closeDialogue(); return; }
  dialogueCurrentNodeId = entry.Id;
  renderArticyNode();
  document.getElementById('dialogue-box').classList.add('open');
}

function closeDialogue() {
  dialogueOpen = false;
  dialogueNPC = null;
  dialogueCurrentNodeId = null;
  dialogueChoices = [];
  document.getElementById('dialogue-box').classList.remove('open');
  document.getElementById('dialogue-scroll').innerHTML = '';
}

function renderArticyNode() {
  if (!dialogueNPC || !dialogueCurrentNodeId || !articyDB) return;
  const frag = articyDB.nodes.get(dialogueCurrentNodeId);
  if (!frag) { closeDialogue(); return; }
  const hue = dialogueNPC.hue;

  // Update portrait/name
  document.getElementById('dialogue-portrait').textContent = '👤';
  document.getElementById('dialogue-portrait').style.borderColor = `hsl(${hue},50%,50%)`;
  document.getElementById('dialogue-name').textContent = dialogueNPC.name;
  document.getElementById('dialogue-name').style.color = `hsl(${hue},50%,70%)`;

  const scroll = document.getElementById('dialogue-scroll');

  // If this is an NPC line (has Text), show it and collect choices from outputs
  if (frag.Text) {
    const entry = document.createElement('div');
    entry.className = 'dialogue-entry';
    entry.innerHTML = `<div class="de-speaker" style="color:hsl(${hue},50%,60%)">${dialogueNPC.name}</div><div class="de-text">${frag.Text}</div>`;
    scroll.appendChild(entry);
    scroll.scrollTop = scroll.scrollHeight;
  }

  // Gather choices: output connections lead to player choice nodes (MenuText) or NPC follow-ups
  const outputs = articyDB.getOutputs(dialogueCurrentNodeId);
  dialogueChoices = [];

  if (outputs.length === 0) {
    // Dead end — offer [Leave]
    dialogueChoices = [{ targetId: null, menuText: '[Leave]' }];
  } else {
    // Check if outputs are player choices (have MenuText) or NPC continuations
    const allPlayerChoices = outputs.every(o => o.target.MenuText);
    if (allPlayerChoices) {
      dialogueChoices = outputs.map(o => ({ targetId: o.targetId, menuText: o.target.MenuText }));
    } else {
      // Single NPC continuation — auto-advance would need a click, show as [Continue]
      dialogueChoices = outputs.map(o => ({
        targetId: o.targetId,
        menuText: o.target.MenuText || '[Continue]'
      }));
    }
  }

  // Render choices
  const choicesEl = document.getElementById('dialogue-choices');
  choicesEl.innerHTML = '';
  dialogueChoices.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'dialogue-choice';
    el.innerHTML = `<span class="choice-num">${i+1}.</span>${c.menuText}`;
    el.addEventListener('click', () => pickDialogueChoice(i));
    choicesEl.appendChild(el);
  });
}

function pickDialogueChoice(idx) {
  if (!dialogueOpen || !dialogueNPC || !articyDB) return;
  if (idx >= dialogueChoices.length) return;
  const choice = dialogueChoices[idx];

  // Talking drains thirst
  player.thirst = clamp(player.thirst - 3, 0, player.maxThirst);
  redPulseAlpha = 0.25;

  // Log player's choice in scroll
  const scroll = document.getElementById('dialogue-scroll');
  const pe = document.createElement('div');
  pe.className = 'dialogue-entry de-player';
  pe.innerHTML = `<div class="de-speaker">YOU</div><div class="de-text">${choice.menuText}</div>`;
  scroll.appendChild(pe);

  if (!choice.targetId) { closeDialogue(); return; }

  // Navigate to the chosen node
  const target = articyDB.nodes.get(choice.targetId);
  if (!target) { closeDialogue(); return; }

  // If this is a player choice node, follow its output to the next NPC line
  if (target.MenuText && !target.Text) {
    const nextOutputs = articyDB.getOutputs(choice.targetId);
    if (nextOutputs.length === 0) { closeDialogue(); return; }
    dialogueCurrentNodeId = nextOutputs[0].targetId;
  } else {
    dialogueCurrentNodeId = choice.targetId;
  }
  renderArticyNode();
}

// Check if a token matches a clothing number (exact or wildcard)
function tokenMatches(token, targetNum) {
  const tStr = String(token.num);
  const cStr = String(targetNum);
  if (!token.wild) return tStr === cStr;
  // Wildcard: '?' matches any digit, lengths must match
  if (tStr.length !== cStr.length) return false;
  for (let i=0;i<tStr.length;i++) { if (tStr[i]!=='?'&&tStr[i]!==cStr[i]) return false; }
  return true;
}

function findMatchingToken(targetNum) {
  return player.tokens.findIndex(t => tokenMatches(t, targetNum));
}

function renderCoatMenu() {
  const c=document.querySelector('#coat-menu .coat-items');
  const tknList = player.tokens.length>0 ? player.tokens.map(t=>`#${t.num}${t.wild?'*':''}`).join(' ') : 'none';
  document.querySelector('#coat-menu .coat-tokens').textContent=`🪙 ${tknList}`;
  c.innerHTML='';
  for (const cl of CLOTHING_DEFS) {
    const owned=player.slots.some(s=>s&&s.item.id===cl.id);
    const matchIdx=findMatchingToken(cl.tokenNum);
    const hasToken=matchIdx!==-1;
    const ok=hasToken&&!owned;
    const el=document.createElement('div');
    el.className='bar-item'+(owned?' cant-afford':(ok?'':' cant-afford'));
    const matchLabel = hasToken ? (player.tokens[matchIdx].wild ? '(wild match!)' : '(token found!)') : '';
    const status = owned ? '(owned)' : hasToken ? matchLabel : `(need #${cl.tokenNum})`;
    el.innerHTML=`<div class="drink-name"><span>${cl.icon}</span><div>${cl.name} ${status}<div class="drink-effect">${cl.desc}</div></div></div><span class="drink-price">#${cl.tokenNum}</span>`;
    if (ok) el.addEventListener('click', ()=>claimClothing(cl));
    c.appendChild(el);
  }
}

function claimClothing(cl) {
  const idx=findMatchingToken(cl.tokenNum);
  if (idx===-1) return;
  if (player.slots.some(s=>s&&s.item.id===cl.id)) return;
  const empty = player.slots.findIndex(s => s === null);
  if (empty === -1) { flash('Inventory full!', '#ff6b6b'); return; }
  player.tokens.splice(idx,1);
  player.slots[empty] = { item:cl, equipped:true, isDrink:false };
  renderInventory();
  flash(`${cl.icon} ${cl.name}`, cl.color);
  renderCoatMenu();
}

function flash(text, color) {
  const el=document.getElementById('pickup-flash');
  el.textContent=text; el.style.color=color||'#ffd93d'; el.style.opacity='1';
  pickupFlashTimer=1.2;
}

// ── INVENTORY ──
function getEffects() {
  const fx = { speedMult:1, revealNPCs:false, staminaRegen:1.0, darken:false, motionBlur:false, staminaDrainMult:1, charisma:false, thirstDrainMult:1 };
  // Active temporary effects (consumables like tablet)
  for (const ae of activeEffects) {
    const ef = ae.effect;
    if (ef.speedMult) fx.speedMult *= ef.speedMult;
    if (ef.motionBlur) fx.motionBlur = true;
    if (ef.revealNPCs) fx.revealNPCs = true;
    if (ef.staminaRegen) fx.staminaRegen += ef.staminaRegen;
    if (ef.darken) fx.darken = true;
  }
  for (const slot of player.slots) {
    if (!slot || !slot.equipped || slot.isDrink) continue;
    const def = slot.item;
    if (def.effect.speedMult) fx.speedMult *= def.effect.speedMult;
    if (def.effect.revealNPCs) fx.revealNPCs = true;
    if (def.effect.staminaRegen) fx.staminaRegen *= def.effect.staminaRegen;
    if (def.effect.darken) fx.darken = true;
    if (def.effect.motionBlur) fx.motionBlur = true;
    if (def.effect.staminaDrainMult) fx.staminaDrainMult *= def.effect.staminaDrainMult;
    if (def.effect.charisma) fx.charisma = true;
    if (def.effect.thirstDrainMult) fx.thirstDrainMult *= def.effect.thirstDrainMult;
  }
  return fx;
}

function addToInventory(itemDef) {
  if (player.slots.some(s => s && s.item.id === itemDef.id)) return false;
  const empty = player.slots.findIndex(s => s === null);
  if (empty === -1) return false;
  player.slots[empty] = { item: itemDef, equipped: true, isDrink: false };
  renderInventory();
  return true;
}

function onSlotClick(idx) {
  const slot = player.slots[idx];
  if (!slot) return;
  if (slot.isDrink) {
    // Consume drink — apply effects
    const d = slot.drinkData;
    if (d) {
      player.thirst = clamp(player.thirst + d.thirst, 0, player.maxThirst);
      player.stamina = clamp(player.stamina + d.stamina, 0, player.maxStamina);
      flash(`${d.icon} Drank ${d.name}`, '#a855f7');
    }
    player.slots[idx] = null;
    renderInventory();
    return;
  }
  // Toggle equip
  slot.equipped = !slot.equipped;
  renderInventory();
}

function renderInventory() {
  const top = document.getElementById('inv-top');
  const bot = document.getElementById('inv-bottom');
  top.innerHTML = ''; bot.innerHTML = '';

  player.slots.forEach((slot, i) => {
    const el = document.createElement('div');
    el.className = 'inv-slot';
    if (!slot) {
      el.classList.add('empty');
      el.innerHTML = '<span class="slot-label">empty</span>';
    } else {
      if (!slot.equipped) el.classList.add('unequipped');
      if (slot.isDrink) el.classList.add('drink-slot');
      el.innerHTML = `<span class="slot-icon">${slot.item.icon}</span><span class="slot-label">${slot.item.name}</span>`;
      el.addEventListener('click', () => onSlotClick(i));
    }
    if (i === 0) top.appendChild(el);
    else bot.appendChild(el);
  });
}
renderInventory();

// ── MINIMAP ──
function updateMinimap() {
  const el=document.getElementById('minimap'); el.innerHTML='';
  for (let ry=0;ry<DH;ry++) for (let rx=0;rx<DW;rx++) {
    const c=document.createElement('div'); c.className='minimap-cell';
    if (rx===curRoom.x&&ry===curRoom.y) c.classList.add('current');
    else if (visited.has(`${rx},${ry}`)) c.classList.add('visited');
    el.appendChild(c);
  }
}
updateMinimap();

function getRoom() { return generateRoom(curRoom.x, curRoom.y); }

// ── TRANSITION ──
let transitioning=false, transAlpha=0, transDir=1, pendingRoom=null, pendingEnter=null;
function startTransition(door) {
  if (transitioning) return;
  const d=DOOR[door]; const nx=curRoom.x+d.dir.x, ny=curRoom.y+d.dir.y;
  if (nx<0||nx>=DW||ny<0||ny>=DH) return;
  transitioning=true; transDir=1; transAlpha=0;
  pendingRoom={x:nx,y:ny}; pendingEnter=d.enter;
}

// (motion blur removed — 3D renderer handles effects via lighting)

// ── UPDATE ──
let lastTime = performance.now();

function update(now) {
  const dt = Math.min((now-lastTime)/1000, 0.05);
  lastTime = now;

  if (pickupFlashTimer>0) { pickupFlashTimer-=dt; if (pickupFlashTimer<=0) document.getElementById('pickup-flash').style.opacity='0'; }

  if (transitioning) {
    transAlpha+=transDir*dt*3;
    if (transDir===1&&transAlpha>=1) {
      transAlpha=1; transDir=-1;
      curRoom=pendingRoom; visited.add(`${curRoom.x},${curRoom.y}`);
      player.x=pendingEnter.tx+0.5; player.y=pendingEnter.ty+0.5;
      generateRoom(curRoom.x,curRoom.y); updateMinimap();
      setCameraForRoom(curRoom.x,curRoom.y); buildRoom3D(getRoom());
    }
    if (transDir===-1&&transAlpha<=0) { transAlpha=0; transitioning=false; }
    requestAnimationFrame(update); draw(); return;
  }

  const room=getRoom();
  const fx=getEffects();

  let dx=0,dy=0;
  if (!dialogueOpen && !barMenuOpen) {
    // Screen-relative WASD based on fixed camera angle
    let fwd = 0, rgt = 0;
    if (keys['w']||keys['arrowup']) fwd += 1;
    if (keys['s']||keys['arrowdown']) fwd -= 1;
    if (keys['a']||keys['arrowleft']) rgt -= 1;
    if (keys['d']||keys['arrowright']) rgt += 1;
    dx = fwd * camForward.x + rgt * camRight.x;
    dy = fwd * camForward.z + rgt * camRight.z;
  }

  player.moving = dx!==0||dy!==0;

  // Speed
  let speedMult = fx.speedMult;

  // Stamina affects speed: linear from 100% at full to 40% at 0
  const staminaFactor = 0.4 + 0.6 * (player.stamina / player.maxStamina);
  speedMult *= staminaFactor;

  // NPC proximity slowdown — tighter hitbox, must actually overlap
  let touchingNPC = false;
  for (const npc of room.npcs) {
    if (npc.hidden && !fx.revealNPCs) continue;
    if (dist(player.x,player.y,npc.x,npc.y) < 0.5) { touchingNPC=true; break; }
  }
  if (!touchingNPC) {
    for (const crowd of room.crowds) {
      for (const m of crowd.members) {
        if (dist(player.x,player.y, crowd.x+m.ox, crowd.y+m.oy) < 0.45) { touchingNPC=true; break; }
      }
      if (touchingNPC) break;
    }
  }
  if (touchingNPC) speedMult *= 0.3;

  if (player.moving) {
    const len=Math.hypot(dx,dy); dx/=len; dy/=len;
    player.x+=dx*player.speed*speedMult*dt;
    player.y+=dy*player.speed*speedMult*dt;
    player.facing={x:dx,y:dy};
    player.bobPhase+=dt*10;
    player.thirst-=3*fx.thirstDrainMult*dt;
  } else {
    player.thirst-=0.5*fx.thirstDrainMult*dt;
  }

  // Stamina drain — slow constant drain
  player.stamina -= 2 * fx.staminaDrainMult * dt;

  // Stamina regen when not moving
  if (!player.moving) player.stamina += 4 * fx.staminaRegen * dt;
  else if (fx.staminaRegen > 1) player.stamina += 2 * fx.staminaRegen * dt;

  player.stamina=clamp(player.stamina,0,player.maxStamina);
  player.thirst=clamp(player.thirst,0,player.maxThirst);
  player.x=clamp(player.x,0.5,ROOM_TILES-0.5);
  player.y=clamp(player.y,0.5,ROOM_TILES-0.5);

  // Tick down temporary effects
  for (let i=activeEffects.length-1;i>=0;i--) {
    activeEffects[i].remaining -= dt;
    if (activeEffects[i].remaining <= 0) activeEffects.splice(i,1);
  }

  // Fade red pulse
  if (redPulseAlpha > 0) redPulseAlpha = Math.max(0, redPulseAlpha - dt * 2);

  // Walls
  for (const w of room.walls) {
    const d=dist(player.x,player.y,w.tx+0.5,w.ty+0.5);
    if (d<0.7&&d>0.01) { const p=0.7-d; player.x+=(player.x-(w.tx+0.5))/d*p; player.y+=(player.y-(w.ty+0.5))/d*p; }
  }
  // Obstacles
  for (const o of room.obstacles) {
    const d=dist(player.x,player.y,o.tx+0.5,o.ty+0.5);
    if (d<0.7&&d>0.01) { const p=0.7-d; player.x+=(player.x-(o.tx+0.5))/d*p; player.y+=(player.y-(o.ty+0.5))/d*p; }
  }
  // Bar counter
  const rk=`${curRoom.x},${curRoom.y}`;
  if (rk===BAR_ROOM) {
    for (let seg=-1;seg<=1;seg++) {
      const bx=BAR_POS.x+seg*0.9, by=BAR_POS.y+seg*0.45;
      const d=dist(player.x,player.y,bx,by);
      if (d<0.8&&d>0.01) { const p=0.8-d; player.x+=(player.x-bx)/d*p; player.y+=(player.y-by)/d*p; }
    }
  }

  // Coat check desk
  if (rk===COAT_CHECK_ROOM) {
    for (let seg=-1;seg<=1;seg++) {
      const cx=COAT_CHECK_POS.x+seg*0.9, cy=COAT_CHECK_POS.y+seg*0.45;
      const d=dist(player.x,player.y,cx,cy);
      if (d<0.8&&d>0.01) { const p=0.8-d; player.x+=(player.x-cx)/d*p; player.y+=(player.y-cy)/d*p; }
    }
  }

  // Doors
  for (const door of room.doors) {
    const dd=DOOR[door];
    if (Math.abs(player.x-(dd.tx+0.5))<1&&Math.abs(player.y-(dd.ty+0.5))<1) { startTransition(door); break; }
  }

  // Pickups
  if (room.item&&!room.item.picked) {
    if (dist(player.x,player.y,room.item.tx,room.item.ty)<1.0) {
      if (room.item.type==='consumable') {
        room.item.picked=true;
        activeEffects.push({ effect:room.item.effect, remaining:room.item.duration||10 });
        flash(`💊 ${room.item.name} — ${room.item.duration}s`, room.item.color);
      } else if (!player.slots.some(s=>s&&s.item.id===room.item.id)) {
        if (addToInventory(room.item)) { room.item.picked=true; flash(`+ ${room.item.name}`); }
      }
    }
  }
  for (let i=room.droppedItems.length-1;i>=0;i--) {
    const di=room.droppedItems[i];
    if (di.picked) continue;
    if (dist(player.x,player.y,di.tx,di.ty)<1.0) {
      if (di.type==='consumable') {
        di.picked=true; room.droppedItems.splice(i,1);
        activeEffects.push({ effect:di.effect, remaining:di.duration||10 });
        flash(`💊 ${di.name} — ${di.duration}s`, di.color);
      } else if (!player.slots.some(s=>s&&s.item.id===di.id)) {
        if (addToInventory(di)) { di.picked=true; room.droppedItems.splice(i,1); flash(`+ ${di.name}`); }
      }
    }
  }

  // Token pickup
  for (const tk of room.tokens) {
    if (!tk.picked && dist(player.x,player.y,tk.tx,tk.ty)<0.8) {
      tk.picked=true;
      player.tokens.push({ num:tk.num, wild:tk.wild });
      flash(`🪙 Token #${tk.num}${tk.wild?' (wild)':''}`, tk.wild?'#ff9d3d':'#ffd93d');
    }
  }

  // Talkable NPC
  nearTalkable=null; let nearD=2.0;
  for (const npc of room.npcs) {
    if (!npc.talkable && !fx.charisma) continue;
    if (npc.hidden&&!fx.revealNPCs) continue;
    const d=dist(player.x,player.y,npc.x,npc.y);
    if (d<nearD) { nearD=d; nearTalkable=npc; }
  }

  // Bar proximity
  nearBar = rk===BAR_ROOM && dist(player.x,player.y,BAR_POS.x,BAR_POS.y)<2.0;
  document.getElementById('bar-prompt').style.opacity = (nearBar&&!barMenuOpen&&!dialogueOpen)?'1':'0';
  if (barMenuOpen&&!nearBar) closeBarMenu();

  nearCoatCheck = rk===COAT_CHECK_ROOM && dist(player.x,player.y,COAT_CHECK_POS.x,COAT_CHECK_POS.y)<2.0;
  document.getElementById('coat-prompt').style.opacity = (nearCoatCheck&&!coatMenuOpen&&!dialogueOpen)?'1':'0';
  if (coatMenuOpen&&!nearCoatCheck) closeCoatMenu();

  // NPC movement
  for (const npc of room.npcs) {
    npc.x+=npc.vx*dt; npc.y+=npc.vy*dt; npc.phase+=dt*2;
    if (npc.x<1.5||npc.x>ROOM_TILES-1.5) npc.vx*=-1;
    if (npc.y<1.5||npc.y>ROOM_TILES-1.5) npc.vy*=-1;
    npc.x=clamp(npc.x,1.5,ROOM_TILES-1.5); npc.y=clamp(npc.y,1.5,ROOM_TILES-1.5);
    if (Math.random()<0.005) { npc.vx=(Math.random()-0.5)*(npc.hidden?0.15:0.5); npc.vy=(Math.random()-0.5)*(npc.hidden?0.15:0.5); }
  }

  // (motion blur trail removed for 3D)

  // UI
  document.getElementById('stamina-bar').style.width=`${(player.stamina/player.maxStamina)*100}%`;
  document.getElementById('thirst-bar').style.width=`${(player.thirst/player.maxThirst)*100}%`;
  document.getElementById('wallet-display').textContent=`€${player.euros}`;
  document.getElementById('token-display').textContent=player.tokens.length>0?`🪙 ${player.tokens.map(t=>'#'+t.num).join(' ')}`:'';

  // Stamina message
  const smsg = document.getElementById('stamina-msg');
  if (player.stamina < 15) { smsg.textContent='EXHAUSTED'; smsg.style.opacity='1'; }
  else if (player.stamina < 40) { smsg.textContent='TIRED'; smsg.style.opacity='1'; }
  else smsg.style.opacity='0';

  // Thirst message
  const tmsg = document.getElementById('thirst-msg');
  if (player.thirst <= 0) {
    tmsg.textContent = THIRSTY_LINES[Math.floor(now/3000) % THIRSTY_LINES.length];
    tmsg.style.opacity='1';
  } else if (player.thirst < 20) {
    tmsg.textContent='GETTING DRY...'; tmsg.style.opacity='1';
  } else tmsg.style.opacity='0';

  // Glow
  document.getElementById('stamina-ui').classList.toggle('glow', player.slots.some(s=>s&&s.equipped&&s.item.id==='sunglasses'));
  if (player.slots.some(s=>s&&s.equipped&&s.item.id==='sunglasses')) {
    const pulse=0.3+Math.sin(now/400)*0.15;
    document.querySelector('#stamina-ui .bar-outer').style.boxShadow=
      `0 0 ${8+pulse*10}px rgba(78,205,196,${pulse}), 0 0 ${16+pulse*10}px rgba(78,205,196,${pulse*0.5})`;
  } else {
    document.querySelector('#stamina-ui .bar-outer').style.boxShadow='';
  }

  const names=[['Main Floor','VIP Booth'],['Lounge','DJ Booth']];
  document.getElementById('room-name').textContent=names[curRoom.y][curRoom.x];

  draw();
  requestAnimationFrame(update);
}

// ── DRAW (Three.js) ──

function draw() {
  const fx = getEffects();
  const room = getRoom();
  const time = performance.now() / 1000;

  // ── PLAYER MESH ──
  const bob = player.moving ? Math.sin(player.bobPhase) * 0.05 : 0;
  playerMesh.position.set(player.x, bob, player.y);
  playerLight.position.set(player.x, 2.5, player.y);
  if (player.moving) {
    const angle = Math.atan2(player.facing.x, player.facing.y);
    playerMesh.rotation.y = angle;
  }
  const exh = player.stamina <= 0;
  playerMesh.userData.body.material.color.set(exh ? 0x999999 : 0xe8e8e8);
  playerMesh.userData.head.material.color.set(exh ? 0xbbbbbb : 0xffffff);
  // Tablet speed effect — emissive glow on player
  if (activeEffects.some(ae => ae.effect.motionBlur)) {
    playerMesh.userData.body.material.emissive = new THREE.Color(0x4ecdc4);
    playerMesh.userData.body.material.emissiveIntensity = 0.3 + Math.sin(time * 8) * 0.15;
  } else {
    playerMesh.userData.body.material.emissive = new THREE.Color(0x000000);
  }
  // Drink aura — purple point light
  if (player.slots.some(s => s && s.equipped && s.item.id === 'drink')) {
    playerLight.color.set(0xa855f7);
    playerLight.intensity = 1.2 + Math.sin(time * 3) * 0.3;
  } else {
    playerLight.color.set(0x4ecdc4);
    playerLight.intensity = 1.0;
  }

  // ── NPC MESHES ──
  const npcs = room.npcs;
  ensurePool(npcPool, npcs.length, () => makeCharMesh(180, 35, 1.0));
  for (let i = 0; i < npcs.length; i++) {
    const npc = npcs[i];
    const mesh = npcPool[i];
    const npcBob = Math.sin(npc.phase) * 0.03;
    mesh.position.set(npc.x, npcBob, npc.y);
    mesh.scale.set(npc.height, npc.height, npc.height);

    if (npc.hidden && !fx.revealNPCs) {
      mesh.visible = true;
      mesh.userData.body.material.color.setHSL(npc.hue / 360, 0.1, 0.08);
      mesh.userData.body.material.transparent = true;
      mesh.userData.body.material.opacity = 0.15 + Math.sin(time * 1.5 + npc.phase) * 0.04;
      mesh.userData.head.material.color.setHSL(npc.hue / 360, 0.1, 0.08);
      mesh.userData.head.material.transparent = true;
      mesh.userData.head.material.opacity = mesh.userData.body.material.opacity;
    } else if (npc.hidden && fx.revealNPCs) {
      mesh.visible = true;
      mesh.userData.body.material.color.setHSL(npc.hue / 360, 0.3, npc.lightness / 100);
      mesh.userData.body.material.transparent = true;
      mesh.userData.body.material.opacity = 0.55;
      mesh.userData.head.material.color.setHSL(npc.hue / 360, 0.15, Math.min(1, npc.lightness / 100 + 0.25));
      mesh.userData.head.material.transparent = true;
      mesh.userData.head.material.opacity = 0.55;
      // Reveal ring — emissive pulse
      mesh.userData.body.material.emissive = new THREE.Color(0xa855f7);
      mesh.userData.body.material.emissiveIntensity = 0.25 + Math.sin(time * 5 + npc.phase) * 0.15;
    } else {
      mesh.visible = true;
      mesh.userData.body.material.color.setHSL(npc.hue / 360, 0.3, npc.lightness / 100);
      mesh.userData.body.material.transparent = true;
      mesh.userData.body.material.opacity = 0.85;
      mesh.userData.head.material.color.setHSL(npc.hue / 360, 0.15, Math.min(1, npc.lightness / 100 + 0.25));
      mesh.userData.head.material.transparent = true;
      mesh.userData.head.material.opacity = 0.85;
      mesh.userData.body.material.emissive = new THREE.Color(0x000000);
    }
  }
  for (let i = npcs.length; i < npcPool.length; i++) npcPool[i].visible = false;

  // ── CROWD MESHES ──
  let crowdIdx = 0;
  for (const c of room.crowds) {
    for (const m of c.members) {
      ensurePool(crowdPool, crowdIdx + 1, () => makeCharMesh(0, 40, 0.9));
      const mesh = crowdPool[crowdIdx];
      mesh.visible = true;
      mesh.userData.body.material.color.setHSL(m.hue / 360, 0.3, m.lightness / 100);
      mesh.userData.head.material.color.setHSL(m.hue / 360, 0.15, Math.min(1, m.lightness / 100 + 0.25));
      mesh.userData.body.material.transparent = false;
      mesh.userData.body.material.opacity = 1;
      mesh.userData.head.material.transparent = false;
      const jump = Math.abs(Math.sin(time * 7.45 + m.phase)) * 0.15;
      const sway = Math.sin(time * 2.5 + m.phase * 1.3) * 0.1;
      mesh.position.set(c.x + m.ox + sway, jump, c.y + m.oy);
      mesh.scale.set(m.height, m.height, m.height);
      crowdIdx++;
    }
  }
  for (let i = crowdIdx; i < crowdPool.length; i++) crowdPool[i].visible = false;

  // ── ITEM MESHES ──
  const roomItems = [];
  if (room.item && !room.item.picked) roomItems.push(room.item);
  for (const di of room.droppedItems) if (!di.picked) roomItems.push(di);
  ensurePool(itemPool, roomItems.length, () => {
    const m = new THREE.Mesh(
      new THREE.OctahedronGeometry(0.25, 0),
      new THREE.MeshPhongMaterial({ color: 0xffd93d, emissive: 0x332200, flatShading: true })
    );
    return m;
  });
  for (let i = 0; i < roomItems.length; i++) {
    const it = roomItems[i];
    const mesh = itemPool[i];
    mesh.visible = true;
    mesh.material.color.set(it.color || '#ffd93d');
    mesh.material.emissive.set(it.color || '#332200');
    mesh.material.emissiveIntensity = 0.3;
    mesh.position.set(it.tx, 0.5 + Math.sin(time * 2.5) * 0.15, it.ty);
    mesh.rotation.y = time * 2;
    mesh.rotation.x = Math.sin(time * 1.5) * 0.3;
  }
  for (let i = roomItems.length; i < itemPool.length; i++) itemPool[i].visible = false;

  // ── TOKEN MESHES ──
  const roomTokens = room.tokens.filter(t => !t.picked);
  ensurePool(tokenPool, roomTokens.length, () => {
    return new THREE.Mesh(
      new THREE.CylinderGeometry(0.12, 0.12, 0.04, 8),
      new THREE.MeshPhongMaterial({ color: 0xffd93d, emissive: 0x332200, flatShading: true })
    );
  });
  for (let i = 0; i < roomTokens.length; i++) {
    const tk = roomTokens[i];
    const mesh = tokenPool[i];
    mesh.visible = true;
    const near = dist(player.x, player.y, tk.tx, tk.ty) < 2.5;
    mesh.material.color.set(near ? 0xffd93d : 0x8a7a3a);
    mesh.material.emissive.set(near ? 0x332200 : 0x000000);
    mesh.position.set(tk.tx, 0.1 + Math.sin(time * 3 + tk.tx * 2) * 0.05, tk.ty);
    mesh.rotation.y = time;
  }
  for (let i = roomTokens.length; i < tokenPool.length; i++) tokenPool[i].visible = false;

  // ── BPM LIGHTING ──
  const beatNum = Math.floor(time * (130 / 60));
  const beatFrac = (time * (130 / 60)) % 1;
  const bh = (beatNum * 2654435761) >>> 0;
  const pulseType = (bh >> 4) % 7;
  let pulse = 0;
  if (pulseType < 2) pulse = Math.pow(Math.cos(beatFrac * Math.PI), 2) * (1 - beatFrac * 0.3);
  else if (pulseType === 2) pulse = Math.max(Math.pow(Math.cos(beatFrac * Math.PI * 2), 2) * (1 - beatFrac), Math.pow(Math.max(0, Math.cos((beatFrac - 0.5) * Math.PI * 2)), 2) * 0.6);
  else if (pulseType === 3) pulse = Math.sin(beatFrac * Math.PI) * 0.8;
  else if (pulseType === 4) pulse = Math.pow(Math.sin(beatFrac * Math.PI * 2), 2) * 0.6;
  const bpmColors = [0xc8b4ff, 0xb4dcff, 0xffc8f0];
  const hueIdx = (bh >> 12) % 3;
  bpmLight1.color.set(bpmColors[hueIdx]);
  bpmLight1.intensity = pulse * 3;
  bpmLight2.color.set(bpmColors[(hueIdx + 1) % 3]);
  bpmLight2.intensity = pulse * 2;

  // ── RENDER ──
  renderer.render(scene, camera);

  // ── CSS OVERLAYS ──
  document.getElementById('fx-transition').style.opacity = transitioning ? transAlpha : 0;
  document.getElementById('fx-stamina').style.opacity = player.stamina < 25 ? (1 - player.stamina / 25) * 0.4 : 0;
  document.getElementById('fx-darken').style.opacity = fx.darken ? 0.3 + Math.sin(performance.now() / 1500) * 0.05 : 0;
  document.getElementById('fx-thirst').style.opacity = player.thirst < 20 ? (1 - player.thirst / 20) * 0.3 : 0;
  document.getElementById('fx-red').style.opacity = redPulseAlpha * 0.6;

  // ── INTERACT PROMPT ──
  const prompt = document.getElementById('interact-3d');
  if (nearTalkable && !dialogueOpen && !barMenuOpen && !coatMenuOpen) {
    const sp = toScreen(nearTalkable.x, nearTalkable.height * 0.9, nearTalkable.y);
    prompt.style.left = sp.x + 'px';
    prompt.style.top = (sp.y - 20) + 'px';
    prompt.style.opacity = player.thirst <= 0 ? '0.3' : '1';
    prompt.textContent = player.thirst <= 0 ? '...' : `[E] ${nearTalkable.name || 'TALK'}`;
  } else {
    prompt.style.opacity = '0';
  }

  // ── ACTIVE EFFECT TIMER ──
  const efxEl = document.getElementById('fx-effects');
  if (activeEffects.length > 0) {
    efxEl.innerHTML = activeEffects.map(ae => `💊 TABLET ${Math.ceil(ae.remaining)}s`).join('<br>');
    efxEl.style.opacity = 0.5 + Math.sin(performance.now() / 300) * 0.3;
  } else {
    efxEl.innerHTML = '';
  }
}

// ── INIT ──
generateRoom(0, 0);
setCameraForRoom(0, 0);
buildRoom3D(getRoom());
requestAnimationFrame(update);
</script>
